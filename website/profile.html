</head>
<body>
    <header class="site-header">
        <h1><a href="/" style="color:inherit;text-decoration:none"><img src="images/logo.png" alt="ClaudeRank logo" class="site-logo">ClaudeRank</a></h1>
        <nav class="header-nav" id="headerNav">

            <button id="themeToggle" onclick="toggleTheme()">dark mode</button>

            <span></span><span></span><span></span>

    <div id="profileContent"><div class="loading">Loading profile</div></div>

    <script type="module">
        import { getUserProfile, getUserHistory, getAllBadges, getUserByUsername, getUserHeatmap, getUserHourlyHeatmap, formatNumber, getCategoryLabel, getTier } from './js/api.js';

        const params = new URLSearchParams(window.location.search);
        const userHash = params.get('hash');
        const username = params.get('username');

        if (userHash) {
            loadProfile(userHash);
        } else if (username) {
            getUserByUsername(username).then(data => {
                loadProfile(data.user_hash);
            }).catch(err => {
                document.getElementById('profileContent').innerHTML =
                    `<div class="loading" style="color:var(--red)">User "${username}" not found</div>`;
            });
        } else {
            document.getElementById('profileContent').innerHTML =
                '<div class="loading" style="color:var(--red)">No user hash or username provided</div>';
        }

        function rankDisplay(rankObj) {
            if (!rankObj) return '';
            return `<div class="rank">#${rankObj.rank} &middot; Top ${rankObj.percentile}%</div>`;
        }

        function aggregateWeekly(dailyData) {
            if (!dailyData || dailyData.length === 0) return [];
            const weeks = [];
            for (let i = 0; i < dailyData.length; i += 7) {
                const chunk = dailyData.slice(i, i + 7);
                weeks.push({
                    date: chunk[0].date,
                    tokens: chunk.reduce((s, d) => s + d.tokens, 0),
                    messages: chunk.reduce((s, d) => s + d.messages, 0),
                    tool_calls: chunk.reduce((s, d) => s + (d.tool_calls || 0), 0),
                    activity: chunk.reduce((s, d) => s + d.activity, 0),
                });
            }
            const acts = weeks.filter(w => w.activity > 0).map(w => w.activity).sort((a, b) => a - b);
            if (acts.length > 0) {
                const q1 = acts[Math.floor(acts.length / 4)] || acts[0];
                const q2 = acts[Math.floor(acts.length / 2)] || acts[0];
                const q3 = acts[Math.floor(acts.length * 3 / 4)] || acts[acts.length - 1];
                weeks.forEach(w => {
                    if (w.activity === 0) w.intensity = 0;
                    else if (w.activity <= q1) w.intensity = 1;
                    else if (w.activity <= q2) w.intensity = 2;
                    else if (w.activity <= q3) w.intensity = 3;
                    else w.intensity = 4;
                });
            } else {
                weeks.forEach(w => w.intensity = 0);
            }
            return weeks;
        }

        function renderHeatmapTiles(data, mode, totalSlots) {
            let tiles = '';
            const padCount = Math.max(0, totalSlots - data.length);
            for (let i = 0; i < padCount; i++) {
                tiles += '<div class="heatmap-tile" data-level="0"></div>';
            }
            for (const d of data) {
                let tip;
                if (mode === '1h') {
                    const dt = new Date(d.hour);
                    const h = dt.getHours();
                    const p = h < 12 ? 'AM' : 'PM';
                    tip = `${h % 12 === 0 ? 12 : h % 12} ${p}: ${d.messages} msgs`;
                } else if (mode === '1d') {
                    const dt = new Date(d.date + 'T00:00:00');
                    tip = `${dt.toLocaleDateString('en', {weekday:'short', month:'short', day:'numeric'})}: ${formatNumber(d.tokens)} tokens, ${d.messages} msgs`;
                } else {
                    const dt = new Date(d.date + 'T00:00:00');
                    tip = `Week of ${dt.toLocaleDateString('en', {month:'short', day:'numeric'})}: ${formatNumber(d.tokens)} tokens, ${d.messages} msgs`;
                }
                tiles += `<div class="heatmap-tile" data-level="${d.intensity}" title="${tip}"></div>`;
            }
            return tiles;
        }

        function renderHeatmapContainer() {
            return `
                <div class="heatmap-container">
                    <div class="heatmap-header">
                        <h3>Activity</h3>
                        <div class="heatmap-toggle">
                            <button data-range="1h">1H</button>
                            <button data-range="1d">1D</button>
                            <button class="active" data-range="1w">1W</button>
                        </div>
                    </div>
                    <div class="heatmap-wrapper">
                        <div class="heatmap-grid" id="heatmapGrid"></div>
                        <div class="heatmap-legend">
                            <span>Less</span>
                            <div class="heatmap-tile" data-level="0"></div>
                            <div class="heatmap-tile" data-level="1"></div>
                            <div class="heatmap-tile" data-level="2"></div>
                            <div class="heatmap-tile" data-level="3"></div>
                            <div class="heatmap-tile" data-level="4"></div>
                            <span>More</span>
                        </div>
                    </div>
                </div>
            `;
        }

        async function loadProfile(hash) {
            const container = document.getElementById('profileContent');
            try {
                const [profile, allBadges, history] = await Promise.all([
                    getUserProfile(hash),
                    getAllBadges(),
                    getUserHistory(hash, 30),
                ]);

                const m = profile.metrics;
                const ranks = profile.ranks || {};
                const tier = profile.tier || { tier: 'Bronze', next_tier: 'Silver', progress: 0 };
                const tierObj = getTier(m.weighted_score);
                const earnedIds = new Set(profile.badges.map(b => b.id));
                const initial = (profile.username || 'A')[0].toUpperCase();

                // XP progress: level = floor(sqrt(points/100)), next level at (level+1)^2 * 100
                const currentLevel = m.level || 0;
                const nextLevelPoints = (currentLevel + 1) * (currentLevel + 1) * 100;
                const prevLevelPoints = currentLevel * currentLevel * 100;
                const xpProgress = nextLevelPoints > prevLevelPoints
                    ? Math.min(((m.total_points - prevLevelPoints) / (nextLevelPoints - prevLevelPoints)) * 100, 100)
                    : 0;

                container.innerHTML = `
                    <div class="profile-header">
                        <div class="profile-avatar">${initial}</div>
                        <div class="profile-info">
                            <h2>${profile.username || 'Anonymous'}
                                <span class="tier-badge tier-${tier.tier.toLowerCase()}">${tierObj.icon} ${tier.tier}</span>
                            </h2>
                            <div class="meta">
                                Joined ${new Date(profile.created_at).toLocaleDateString()}
                                ${profile.team_hash ? ` &middot; Team: <a href="/team.html?hash=${profile.team_hash}">${profile.team_hash}</a>` : ''}
                            </div>
                        </div>
                    </div>

                    <div class="profile-gamification">
                        <div class="streak-display">
                            <div class="streak-icon">\u{1f525}</div>
                            <div class="streak-info">
                                <div class="streak-count">${m.current_streak} day${m.current_streak !== 1 ? 's' : ''}</div>
                                <div class="streak-label">Current Streak</div>
                            </div>
                        </div>
                        <div class="xp-display">
                            <div class="level-badge">${currentLevel}</div>
                            <div class="xp-info">
                                <div class="xp-label">Level ${currentLevel}</div>
                                <div class="xp-bar"><div class="xp-fill" style="width:${xpProgress.toFixed(1)}%"></div></div>
                                <div class="xp-text">${formatNumber(m.total_points)} / ${formatNumber(nextLevelPoints)} XP</div>
                            </div>
                        </div>
                    </div>

                    <div class="profile-stats">
                        <div class="stat-card">
                            <div class="label">Total Tokens</div>
                            <div class="value">${formatNumber(m.total_tokens)}</div>
                            ${rankDisplay(ranks.tokens)}
                        </div>
                        <div class="stat-card">
                            <div class="label">Messages</div>
                            <div class="value">${formatNumber(m.total_messages)}</div>
                            ${rankDisplay(ranks.messages)}
                        </div>
                        <div class="stat-card">
                            <div class="label">Sessions</div>
                            <div class="value">${formatNumber(m.total_sessions)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">Tool Calls</div>
                            <div class="value">${formatNumber(m.total_tool_calls)}</div>
                            ${rankDisplay(ranks.tools)}
                        </div>
                        <div class="stat-card">
                            <div class="label">Max Concurrent</div>
                            <div class="value">${m.max_concurrent || '\u2014'}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">Concurrent Mins</div>
                            <div class="value">${m.concurrent_mins > 0 ? m.concurrent_mins + 'm' : '\u2014'}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">Weighted Score</div>
                            <div class="value">${m.weighted_score.toFixed(1)}</div>
                            ${rankDisplay(ranks.weighted)}
                        </div>
                    </div>

                    ${renderHeatmapContainer()}

                    <div class="profile-badges">
                        <h3>Badges (${profile.badges.length} / ${allBadges.length})</h3>
                        <div class="badges-grid">
                            ${allBadges.map(b => `
                                <div class="badge-card ${earnedIds.has(b.id) ? '' : 'locked'}">
                                    <div class="icon">${b.icon || '?'}</div>
                                    <div class="name">${b.name}</div>
                                    <div class="desc">${b.description}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    ${history.length > 0 ? `
                    <div class="chart-container">
                        <h3>Token Growth (Last 30 Days)</h3>
                        <canvas id="tokenChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <h3>Messages Over Time</h3>
                        <canvas id="messageChart"></canvas>
                    </div>
                    ` : ''}
                `;

                // Heatmap toggle logic
                function getMaxCols(gridEl) {
                    const w = gridEl.clientWidth;
                    if (w <= 0) return 20;
                    return Math.floor((w + 3) / (12 + 3));
                }

                async function loadHeatmapView(range) {
                    const grid = document.getElementById('heatmapGrid');
                    if (!grid) return;
                    const maxCols = getMaxCols(grid);
                    const maxTiles = maxCols * 4;

                    let data;
                    if (range === '1h') {
                        data = await getUserHourlyHeatmap(hash, Math.min(maxTiles, 720));
                    } else if (range === '1d') {
                        data = await getUserHeatmap(hash, Math.min(maxTiles, 730));
                    } else {
                        const dailyData = await getUserHeatmap(hash, Math.min(maxTiles * 7, 730));
                        data = aggregateWeekly(dailyData);
                    }
                    if (data.length > maxTiles) data = data.slice(-maxTiles);
                    const totalSlots = Math.ceil(data.length / 4) * 4;
                    grid.innerHTML = renderHeatmapTiles(data, range, totalSlots);
                }

                document.querySelector('.heatmap-toggle').addEventListener('click', (e) => {
                    const btn = e.target.closest('button[data-range]');
                    if (!btn) return;
                    document.querySelectorAll('.heatmap-toggle button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadHeatmapView(btn.dataset.range);
                });

                // Load default view (1W)
                loadHeatmapView('1w');

                if (history.length > 0) {
                    const sorted = [...history].sort((a, b) => a.date.localeCompare(b.date));
                    const dates = sorted.map(h => h.date);
                    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                    const lineColor = isDark ? '#e0e0e0' : '#333';
                    const fillColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
                    const gridColor = isDark ? '#1a1a1a' : '#e8e8e8';
                    const tickColor = isDark ? '#888' : '#888';
                    const chartOpts = {
                        responsive: true,
                        maintainAspectRatio: true,
                        aspectRatio: 3,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { ticks: { color: tickColor, maxTicksLimit: 10 }, grid: { color: gridColor } },
                            y: { ticks: { color: tickColor }, grid: { color: gridColor } },
                        },
                    };

                    new Chart(document.getElementById('tokenChart'), {
                        type: 'line',
                        data: {
                            labels: dates,
                            datasets: [{
                                data: sorted.map(h => h.tokens),
                                borderColor: lineColor,
                                backgroundColor: fillColor,
                                fill: true, tension: 0.3, pointRadius: 2,
                            }],
                        },
                        options: chartOpts,
                    });

                    new Chart(document.getElementById('messageChart'), {
                        type: 'line',
                        data: {
                            labels: dates,
                            datasets: [{
                                data: sorted.map(h => h.messages),
                                borderColor: lineColor,
                                backgroundColor: fillColor,
                                fill: true, tension: 0.3, pointRadius: 2,
                            }],
                        },
                        options: chartOpts,
                    });
                }

                document.title = `${profile.username || 'Anonymous'} - ClaudeRank`;
            } catch (err) {
                container.innerHTML = `<div class="loading" style="color:var(--red)">Error: ${err.message}</div>`;
            }
        }
    </script>
    <script>
        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            updateToggleLabel();
        }
        function updateToggleLabel() {
            const btn = document.getElementById('themeToggle');
            if (!btn) return;
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            btn.textContent = isDark ? 'light mode' : 'dark mode';
        }
        updateToggleLabel();
    </script>
    <script>
        function toggleMenu() {
            document.getElementById('headerNav').classList.toggle('open');
            document.getElementById('hamburgerBtn').classList.toggle('open');
        }
        document.addEventListener('click', function(e) {
            var nav = document.getElementById('headerNav');
            var btn = document.getElementById('hamburgerBtn');
            if (nav && nav.classList.contains('open') &&
                !nav.contains(e.target) && !btn.contains(e.target)) {
                nav.classList.remove('open');
                btn.classList.remove('open');
            }
        });
    </script>
</body>
</html>
