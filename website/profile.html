    <div id="profileContent"><div class="loading">Loading profile</div></div>

    <script type="module">
        import { getUserProfile, getUserHistory, getAllBadges, getUserByUsername, getUserHeatmap, getUserHourlyHeatmap, getUserConcurrency, getUserConcurrencyByDate, formatNumber, getCategoryLabel, getTier } from './js/api.js';

        const params = new URLSearchParams(window.location.search);
        const userHash = params.get('hash');
        const username = params.get('username');

        if (userHash) {
            loadProfile(userHash);
        } else if (username) {
            getUserByUsername(username).then(data => {
                loadProfile(data.user_hash);
            }).catch(err => {
                document.getElementById('profileContent').innerHTML =
                    `<div class="loading" style="color:var(--red)">User "${username}" not found</div>`;
            });
        } else {
            document.getElementById('profileContent').innerHTML =
                '<div class="loading" style="color:var(--red)">No user hash or username provided</div>';
        }

        function rankDisplay(rankObj) {
            if (!rankObj) return '';
            return `<div class="rank">#${rankObj.rank} &middot; Top ${rankObj.percentile}%</div>`;
        }

        function aggregateWeekly(dailyData) {
            if (!dailyData || dailyData.length === 0) return [];
            const weeks = [];
            for (let i = 0; i < dailyData.length; i += 7) {
                const chunk = dailyData.slice(i, i + 7);
                weeks.push({
                    date: chunk[0].date,
                    tokens: chunk.reduce((s, d) => s + d.tokens, 0),
                    messages: chunk.reduce((s, d) => s + d.messages, 0),
                    tool_calls: chunk.reduce((s, d) => s + (d.tool_calls || 0), 0),
                    activity: chunk.reduce((s, d) => s + d.activity, 0),
                });
            }
            const acts = weeks.filter(w => w.activity > 0).map(w => w.activity).sort((a, b) => a - b);
            if (acts.length > 0) {
                const q1 = acts[Math.floor(acts.length / 4)] || acts[0];
                const q2 = acts[Math.floor(acts.length / 2)] || acts[0];
                const q3 = acts[Math.floor(acts.length * 3 / 4)] || acts[acts.length - 1];
                weeks.forEach(w => {
                    if (w.activity === 0) w.intensity = 0;
                    else if (w.activity <= q1) w.intensity = 1;
                    else if (w.activity <= q2) w.intensity = 2;
                    else if (w.activity <= q3) w.intensity = 3;
                    else w.intensity = 4;
                });
            } else {
                weeks.forEach(w => w.intensity = 0);
            }
            return weeks;
        }

        function renderHeatmapTiles(data, mode, totalSlots) {
            let tiles = '';
            const padCount = Math.max(0, totalSlots - data.length);
            for (let i = 0; i < padCount; i++) {
                tiles += '<div class="heatmap-tile" data-level="0"></div>';
            }
            for (const d of data) {
                let tip;
                if (mode === '1h') {
                    const dt = new Date(d.hour);
                    const h = dt.getHours();
                    const p = h < 12 ? 'AM' : 'PM';
                    tip = `${h % 12 === 0 ? 12 : h % 12} ${p}: ${d.messages} msgs`;
                } else if (mode === '1d') {
                    const dt = new Date(d.date + 'T00:00:00');
                    tip = `${dt.toLocaleDateString('en', {weekday:'short', month:'short', day:'numeric'})}: ${formatNumber(d.tokens)} tokens, ${d.messages} msgs`;
                } else {
                    const dt = new Date(d.date + 'T00:00:00');
                    tip = `Week of ${dt.toLocaleDateString('en', {month:'short', day:'numeric'})}: ${formatNumber(d.tokens)} tokens, ${d.messages} msgs`;
                }
                tiles += `<div class="heatmap-tile" data-level="${d.intensity}" title="${tip}"></div>`;
            }
            return tiles;
        }

        function renderHeatmapContainer() {
            return `
                <div class="heatmap-container">
                    <div class="heatmap-header">
                        <h3>Activity</h3>
                        <div class="heatmap-toggle">
                            <button data-range="1h">1H</button>
                            <button data-range="1d">1D</button>
                            <button class="active" data-range="1w">1W</button>
                        </div>
                    </div>
                    <div class="heatmap-wrapper">
                        <div class="heatmap-grid" id="heatmapGrid"></div>
                        <div class="heatmap-legend">
                            <span>Less</span>
                            <div class="heatmap-tile" data-level="0"></div>
                            <div class="heatmap-tile" data-level="1"></div>
                            <div class="heatmap-tile" data-level="2"></div>
                            <div class="heatmap-tile" data-level="3"></div>
                            <div class="heatmap-tile" data-level="4"></div>
                            <span>More</span>
                        </div>
                    </div>
                </div>
            `;
        }

        async function loadProfile(hash) {
            const container = document.getElementById('profileContent');
            try {
                const [profile, allBadges, history] = await Promise.all([
                    getUserProfile(hash),
                    getAllBadges(),
                    getUserHistory(hash, 30),
                ]);

                const m = profile.metrics;
                const ranks = profile.ranks || {};
                const tier = profile.tier || { tier: 'Bronze', next_tier: 'Silver', progress: 0 };
                const tierObj = getTier(m.weighted_score);
                const earnedIds = new Set(profile.badges.map(b => b.id));
                const initial = (profile.username || 'A')[0].toUpperCase();

                // XP progress: level = floor(sqrt(points/100)), next level at (level+1)^2 * 100
                const currentLevel = m.level || 0;
                const nextLevelPoints = (currentLevel + 1) * (currentLevel + 1) * 100;
                const prevLevelPoints = currentLevel * currentLevel * 100;
                const xpProgress = nextLevelPoints > prevLevelPoints
                    ? Math.min(((m.total_points - prevLevelPoints) / (nextLevelPoints - prevLevelPoints)) * 100, 100)
                    : 0;

                container.innerHTML = `
                    <div class="profile-header">
                        <div class="profile-avatar">${initial}</div>
                        <div class="profile-info">
                            <h2>${profile.username || 'Anonymous'}
                                <span class="tier-badge tier-${tier.tier.toLowerCase()}">${tierObj.icon} ${tier.tier}</span>
                            </h2>
                            <div class="meta">
                                Joined ${new Date(profile.created_at).toLocaleDateString()}
                                ${profile.team_hash ? ` &middot; Team: <a href="/team.html?hash=${profile.team_hash}">${profile.team_hash}</a>` : ''}
                            </div>
                        </div>
                    </div>

                    <div class="burn-clock-container-full">
                        <div class="burn-clock-header-full">
                            <h3>Session Burn Clock</h3>
                            <button class="copy-burn-btn" id="copyConcurrency">Copy</button>
                        </div>
                        <div class="burn-clock-wrapper">
                            <div class="burn-clock-section-label">Daily</div>
                            <div class="burn-clock-day-nav" style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;">
                                <button class="copy-burn-btn" id="dayPrev" style="font-size:16px;padding:4px 10px;" title="Previous day">&#9664;</button>
                                <span id="dayLabel" style="font-size:13px;font-weight:600;min-width:90px;text-align:center;">Today</span>
                                <button class="copy-burn-btn" id="dayNext" style="font-size:16px;padding:4px 10px;" title="Next day" disabled>&#9654;</button>
                            </div>
                            <div class="burn-clock-section">
                                <div class="burn-clock-svg-container v2">
                                    <svg class="burn-clock-v2-svg" id="burnClockV2" viewBox="0 0 860 300"></svg>
                                </div>
                            </div>
                            <div class="burn-clock-section">
                                <div class="burn-clock-section-label">Weekly Average</div>
                                <div class="burn-clock-svg-container">
                                    <svg class="burn-clock-svg" id="burnClock" viewBox="0 0 320 320"></svg>
                                    <div class="burn-clock-center" id="burnClockCenter">
                                        <div class="burn-clock-peak">0</div>
                                        <div class="burn-clock-peak-label">Peak Avg</div>
                                    </div>
                                </div>
                            </div>
                            <div class="burn-clock-legend">
                                <span class="legend-label">~10 min</span>
                                <div class="legend-gradient"></div>
                                <span class="legend-label">~60 min</span>
                            </div>
                            <div class="copy-feedback" id="concurrencyFeedback">Copied to clipboard!</div>
                        </div>
                    </div>

                    <div class="profile-gamification">
                        <div class="streak-display">
                            <div class="streak-icon">\u{1f525}</div>
                            <div class="streak-info">
                                <div class="streak-count">${m.current_streak} day${m.current_streak !== 1 ? 's' : ''}</div>
                                <div class="streak-label">Current Streak</div>
                            </div>
                        </div>
                        <div class="xp-display">
                            <div class="level-badge">${currentLevel}</div>
                            <div class="xp-info">
                                <div class="xp-label">Level ${currentLevel}</div>
                                <div class="xp-bar"><div class="xp-fill" style="width:${xpProgress.toFixed(1)}%"></div></div>
                                <div class="xp-text">${formatNumber(m.total_points)} / ${formatNumber(nextLevelPoints)} XP</div>
                            </div>
                        </div>
                    </div>

                    <div class="profile-stats">
                        <div class="stat-card">
                            <div class="label">Total Tokens</div>
                            <div class="value">${formatNumber(m.total_tokens)}</div>
                            ${rankDisplay(ranks.tokens)}
                        </div>
                        <div class="stat-card">
                            <div class="label">Messages</div>
                            <div class="value">${formatNumber(m.total_messages)}</div>
                            ${rankDisplay(ranks.messages)}
                        </div>
                        <div class="stat-card">
                            <div class="label">Sessions</div>
                            <div class="value">${formatNumber(m.total_sessions)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">Tool Calls</div>
                            <div class="value">${formatNumber(m.total_tool_calls)}</div>
                            ${rankDisplay(ranks.tools)}
                        </div>
                        <div class="stat-card">
                            <div class="label">Max Concurrent</div>
                            <div class="value">${m.max_concurrent || '\u2014'}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">Concurrent Mins</div>
                            <div class="value">${m.concurrent_mins > 0 ? m.concurrent_mins + 'm' : '\u2014'}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">Weighted Score</div>
                            <div class="value">${m.weighted_score.toFixed(1)}</div>
                            ${rankDisplay(ranks.weighted)}
                        </div>
                    </div>

                    ${renderHeatmapContainer()}

                    <div class="profile-badges">
                        <h3>Badges (${profile.badges.length} / ${allBadges.length})</h3>
                        <div class="badges-grid">
                            ${allBadges.map(b => `
                                <div class="badge-card ${earnedIds.has(b.id) ? '' : 'locked'}">
                                    <div class="icon">${b.icon || '?'}</div>
                                    <div class="name">${b.name}</div>
                                    <div class="desc">${b.description}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    ${history.length > 0 ? `
                    <div class="chart-container">
                        <h3>Token Growth (Last 30 Days)</h3>
                        <canvas id="tokenChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <h3>Messages Over Time</h3>
                        <canvas id="messageChart"></canvas>
                    </div>
                    ` : ''}
                `;

                // Heatmap toggle logic
                function getMaxCols(gridEl) {
                    const w = gridEl.clientWidth;
                    if (w <= 0) return 20;
                    return Math.floor((w + 3) / (12 + 3));
                }

                async function loadHeatmapView(range) {
                    const grid = document.getElementById('heatmapGrid');
                    if (!grid) return;
                    const maxCols = getMaxCols(grid);
                    const maxTiles = maxCols * 4;

                    let data;
                    if (range === '1h') {
                        data = await getUserHourlyHeatmap(hash, Math.min(maxTiles, 720));
                    } else if (range === '1d') {
                        data = await getUserHeatmap(hash, Math.min(maxTiles, 730));
                    } else {
                        const dailyData = await getUserHeatmap(hash, Math.min(maxTiles * 7, 730));
                        data = aggregateWeekly(dailyData);
                    }
                    if (data.length > maxTiles) data = data.slice(-maxTiles);
                    const totalSlots = Math.ceil(data.length / 4) * 4;
                    grid.innerHTML = renderHeatmapTiles(data, range, totalSlots);
                }

                document.querySelector('.heatmap-toggle').addEventListener('click', (e) => {
                    const btn = e.target.closest('button[data-range]');
                    if (!btn) return;
                    document.querySelectorAll('.heatmap-toggle button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadHeatmapView(btn.dataset.range);
                });

                // Load default view (1W)
                loadHeatmapView('1w');

                // Load and render burn clock visualization with day navigation
                let burnClockDayData = [];
                let burnClockWeekData = [];
                let burnDayOffset = 0;
                let weekConcurrencyCache = {};

                function formatDateISO(d) { return d.toISOString().split('T')[0]; }
                function localDateISO(d) {
                    return d.getFullYear() + '-' +
                        String(d.getMonth() + 1).padStart(2, '0') + '-' +
                        String(d.getDate()).padStart(2, '0');
                }
                function utcDatesForLocalDay(localDateStr) {
                    const localMidnight = new Date(localDateStr + 'T00:00:00');
                    const dates = new Set();
                    for (let h = 0; h < 24; h++) {
                        const t = new Date(localMidnight.getTime() + h * 3600000);
                        dates.add(t.toISOString().split('T')[0]);
                    }
                    return [...dates];
                }
                function dateForOffset(offset) {
                    const d = new Date();
                    d.setDate(d.getDate() + offset);
                    return d;
                }
                function formatDayLabel(offset) {
                    if (offset === 0) return 'Today';
                    const d = dateForOffset(offset);
                    return d.toLocaleDateString('en', { month: 'short', day: 'numeric' });
                }

                function computeWeeklyAverage(cachedData, localDateStrArray) {
                    const averaged = {};
                    for (let h = 0; h < 24; h++) {
                        const combinedHistogram = {};
                        for (const dayStr of localDateStrArray) {
                            const dayData = cachedData[dayStr];
                            if (!dayData) continue;
                            const localMidnight = new Date(dayStr + 'T00:00:00');
                            const t = new Date(localMidnight.getTime() + h * 3600000);
                            const utcDate = t.toISOString().split('T')[0];
                            const utcHour = t.getUTCHours();
                            const key = utcDate + ':' + utcHour;
                            const raw = dayData[key];
                            const hist = (typeof raw === 'object' && raw !== null && raw.histogram) ? raw.histogram : raw;
                            if (typeof hist === 'object' && hist !== null) {
                                for (const [conc, mins] of Object.entries(hist)) {
                                    combinedHistogram[conc] = (combinedHistogram[conc] || 0) + mins;
                                }
                            } else if (typeof hist === 'number' && hist > 0) {
                                for (let n = 1; n <= hist; n++) {
                                    combinedHistogram[String(n)] = (combinedHistogram[String(n)] || 0) + 30;
                                }
                            }
                        }
                        // Average by 7 days
                        const avgHistogram = {};
                        for (const [conc, mins] of Object.entries(combinedHistogram)) {
                            avgHistogram[conc] = mins / 7;
                        }
                        if (Object.keys(avgHistogram).length > 0) {
                            const refDateStr = localDateStrArray[localDateStrArray.length - 1];
                            const localMidnight = new Date(refDateStr + 'T00:00:00');
                            const t = new Date(localMidnight.getTime() + h * 3600000);
                            const utcDate = t.toISOString().split('T')[0];
                            const utcHour = t.getUTCHours();
                            const key = utcDate + ':' + utcHour;
                            averaged[key] = { histogram: avgHistogram };
                        }
                    }
                    return averaged;
                }

                async function fetchDayConcurrency(localDateStr) {
                    if (weekConcurrencyCache[localDateStr]) return weekConcurrencyCache[localDateStr];
                    const utcDates = utcDatesForLocalDay(localDateStr);
                    const results = await Promise.all(utcDates.map(d => getUserConcurrencyByDate(hash, d)));
                    const data = Object.assign({}, ...results);
                    weekConcurrencyCache[localDateStr] = data;
                    return data;
                }

                async function loadBurnClockDay(offset) {
                    burnDayOffset = offset;
                    const targetDate = dateForOffset(offset);
                    const localDateStr = localDateISO(targetDate);

                    document.getElementById('dayLabel').textContent = formatDayLabel(offset);
                    document.getElementById('dayNext').disabled = (offset >= 0);
                    document.getElementById('dayPrev').disabled = (offset <= -13);

                    try {
                        // Fetch and render daily view immediately
                        const dayConcurrency = await fetchDayConcurrency(localDateStr);
                        renderBurnClockV2(dayConcurrency, profile.username, localDateStr);

                        // Compute 7-day window (selected day - 6 through selected day)
                        const weekDates = [];
                        for (let i = 6; i >= 0; i--) {
                            const d = new Date(targetDate);
                            d.setDate(d.getDate() - i);
                            weekDates.push(localDateISO(d));
                        }

                        // Fetch uncached days in parallel
                        await Promise.all(weekDates.map(ds => fetchDayConcurrency(ds)));

                        // Compute weekly average and render circular clock
                        const weekAvg = computeWeeklyAverage(weekConcurrencyCache, weekDates);
                        renderBurnClock(weekAvg, profile.username, localDateStr);

                        // Setup copy button using day data
                        const copyBtn = document.getElementById('copyConcurrency');
                        if (copyBtn) {
                            copyBtn.onclick = () => {
                                const emojis = burnClockDayData.map(d => {
                                    const count = d.sessions.length;
                                    if (count === 0) return '\u{1f534}';
                                    if (count === 1) return '\u{1f7e0}';
                                    if (count === 2) return '\u{1f7e1}';
                                    return '\u26aa';
                                }).join('');
                                const peak = Math.max(0, ...burnClockDayData.map(d => d.sessions.length));
                                const text = (profile.username || 'Anonymous') + "'s ClaudeRank 24h\n" + emojis + "\nPeak: " + peak + " sessions | clauderank.com";
                                navigator.clipboard.writeText(text);
                                const fb = document.getElementById('concurrencyFeedback');
                                fb.classList.add('show');
                                setTimeout(() => fb.classList.remove('show'), 2000);
                            };
                        }
                    } catch (e) {
                        console.error('Failed to load concurrency data:', e);
                    }
                }

                document.getElementById('dayPrev').addEventListener('click', () => {
                    if (burnDayOffset > -13) loadBurnClockDay(burnDayOffset - 1);
                });
                document.getElementById('dayNext').addEventListener('click', () => {
                    if (burnDayOffset < 0) loadBurnClockDay(burnDayOffset + 1);
                });

                loadBurnClockDay(0);

                // Burn clock rendering functions
                function processHourlyData(allHistograms, localDateStr) {
                    const hourlyData = [];
                    const localMidnight = new Date(localDateStr + 'T00:00:00');
                    const now = new Date();
                    const isToday = localDateStr === localDateISO(now);

                    for (let h = 0; h < 24; h++) {
                        const t = new Date(localMidnight.getTime() + h * 3600000);
                        const utcDate = t.toISOString().split('T')[0];
                        const utcHour = t.getUTCHours();
                        const key = utcDate + ':' + utcHour;

                        const raw = allHistograms[key];
                        const histogramOrPeak = (typeof raw === 'object' && raw !== null && raw.histogram) ? raw.histogram : raw;
                        const sessions = [];

                        if (typeof histogramOrPeak === 'object' && histogramOrPeak !== null) {
                            for (let n = 1; n <= 7; n++) {
                                let totalMins = 0;
                                for (const [conc, mins] of Object.entries(histogramOrPeak)) {
                                    if (parseInt(conc, 10) >= n) totalMins += mins;
                                }
                                if (totalMins > 0) {
                                    const seed = (h * 7 + n * 13) % 17;
                                    const variation = 0.85 + (seed / 17) * 0.15;
                                    const intensity = Math.min((totalMins / 60) * variation, 1);
                                    sessions.push({ index: n, intensity, minutes: totalMins });
                                }
                            }
                        } else if (typeof histogramOrPeak === 'number' && histogramOrPeak > 0) {
                            for (let n = 1; n <= histogramOrPeak; n++) {
                                const seed = (h * 7 + n * 13) % 17;
                                const intensity = 0.5 + (seed / 17) * 0.5;
                                sessions.push({ index: n, intensity, minutes: 30 });
                            }
                        }

                        const isCurrent = isToday && h === now.getHours();

                        hourlyData.push({
                            hour: h,
                            sessions,
                            isCurrent,
                            date: t
                        });
                    }
                    return hourlyData;
                }

                function getBurnColor(intensity) {
                    const r1 = 252, g1 = 240, b1 = 228;
                    const r2 = 204, g2 = 88, b2 = 28;
                    const r = Math.round(r1 + (r2 - r1) * intensity);
                    const g = Math.round(g1 + (g2 - g1) * intensity);
                    const b = Math.round(b1 + (b2 - b1) * intensity);
                    return `rgb(${r},${g},${b})`;
                }

                function annularSector(cx, cy, r1, r2, a0, a1) {
                    const toRad = Math.PI / 180;
                    const cos0 = Math.cos(a0 * toRad), sin0 = Math.sin(a0 * toRad);
                    const cos1 = Math.cos(a1 * toRad), sin1 = Math.sin(a1 * toRad);

                    const x1 = cx + r1 * cos0, y1 = cy + r1 * sin0;
                    const x2 = cx + r2 * cos0, y2 = cy + r2 * sin0;
                    const x3 = cx + r2 * cos1, y3 = cy + r2 * sin1;
                    const x4 = cx + r1 * cos1, y4 = cy + r1 * sin1;

                    const largeArc = (a1 - a0) > 180 ? 1 : 0;

                    return `M ${x1} ${y1} L ${x2} ${y2} A ${r2} ${r2} 0 ${largeArc} 1 ${x3} ${y3} L ${x4} ${y4} A ${r1} ${r1} 0 ${largeArc} 0 ${x1} ${y1} Z`;
                }

                function formatHour(h) {
                    const period = h < 12 ? 'AM' : 'PM';
                    const displayH = h % 12 === 0 ? 12 : h % 12;
                    return displayH + ' ' + period;
                }

                function formatDateHour(date) {
                    const h = date.getHours();
                    const period = h < 12 ? 'AM' : 'PM';
                    const displayH = h % 12 === 0 ? 12 : h % 12;
                    const dateStr = date.toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric' });
                    return dateStr + ', ' + displayH + ' ' + period;
                }

                function renderBurnClock(concurrencyHistogram, username, localDateStr) {
                    const svg = document.getElementById('burnClock');
                    const centerEl = document.getElementById('burnClockCenter');
                    if (!svg) return;

                    const hourlyData = processHourlyData(concurrencyHistogram, localDateStr);
                    burnClockWeekData = hourlyData;

                    const cx = 160, cy = 160;
                    const baseRadius = 50;
                    const pillWidth = 10;
                    const pillGap = 4;
                    const maxRings = 7;

                    let svgContent = '';
                    let maxSessions = 0;

                    // Draw center circle
                    svgContent += `<circle cx="${cx}" cy="${cy}" r="${baseRadius - 6}" fill="rgba(204,88,28,0.08)" />`;

                    // Cardinal labels
                    const cardinals = [
                        { angle: -90, label: '12am' },
                        { angle: 0, label: '6am' },
                        { angle: 90, label: '12pm' },
                        { angle: 180, label: '6pm' }
                    ];
                    const labelRadius = cx - 10;
                    cardinals.forEach(c => {
                        const toRad = Math.PI / 180;
                        const x = cx + labelRadius * Math.cos(c.angle * toRad);
                        const y = cy + labelRadius * Math.sin(c.angle * toRad);
                        svgContent += `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" fill="currentColor" font-size="10" font-family="inherit">${c.label}</text>`;
                    });

                    // Draw hour slices
                    for (let i = 0; i < 24; i++) {
                        const data = hourlyData[i];
                        const startAngle = -90 + (i * 15);
                        const endAngle = startAngle + 13;

                        if (data.sessions.length > maxSessions) {
                            maxSessions = data.sessions.length;
                        }

                        for (const session of data.sessions) {
                            if (session.index > maxRings) continue;

                            const r1 = baseRadius + (session.index - 1) * (pillWidth + pillGap);
                            const r2 = r1 + pillWidth;
                            const color = getBurnColor(session.intensity);

                            const path = annularSector(cx, cy, r1, r2, startAngle, endAngle);
                            const tooltipText = formatDateHour(data.date) + ': ' + data.sessions.length + ' avg session' + (data.sessions.length !== 1 ? 's' : '');
                            svgContent += `<path class="burn-pill" d="${path}" fill="${color}" data-hour="${data.hour}" data-sessions="${data.sessions.length}">
                                <title>${tooltipText}</title>
                            </path>`;
                        }
                    }

                    svg.innerHTML = svgContent;

                    // Update center badge
                    if (centerEl) {
                        centerEl.querySelector('.burn-clock-peak').textContent = maxSessions;
                    }
                }

                function renderBurnClockV2(concurrencyHistogram, username, localDateStr) {
                    const svg = document.getElementById('burnClockV2');
                    if (!svg) return;

                    const hourlyData = processHourlyData(concurrencyHistogram, localDateStr);
                    burnClockDayData = hourlyData;

                    const chartLeft = 30, chartRight = 830, chartTop = 10, chartBottom = 250;
                    const barWidth = 31, barGap = 3;
                    const segHeight = 31, segGap = 3, maxSegs = 7;
                    let svgContent = '';

                    for (let i = 0; i < 24; i++) {
                        const data = hourlyData[i];
                        const x = chartLeft + i * (barWidth + barGap);
                        const hour12 = i === 0 ? '12 AM' : i < 12 ? i + ' AM' : i === 12 ? '12 PM' : (i - 12) + ' PM';
                        const tooltipText = hour12 + ': ' + data.sessions.length + ' session' + (data.sessions.length !== 1 ? 's' : '');

                        for (const session of data.sessions) {
                            if (session.index > maxSegs) continue;
                            const segY = chartBottom - session.index * (segHeight + segGap);
                            const color = getBurnColor(session.intensity);
                            svgContent += '<rect class="burn-bar" x="' + x + '" y="' + segY + '" width="' + barWidth + '" height="' + segHeight + '" rx="4" ry="4" fill="' + color + '"><title>' + tooltipText + '</title></rect>';
                        }

                        if (data.isCurrent) {
                            svgContent += '<rect x="' + x + '" y="' + (chartBottom + 5) + '" width="' + barWidth + '" height="4" rx="2" fill="#CC581C" />';
                        }
                    }

                    const axisLabels = [
                        { label: '12am', hour: 0 }, { label: '3am', hour: 3 },
                        { label: '6am', hour: 6 },  { label: '9am', hour: 9 },
                        { label: '12pm', hour: 12 }, { label: '3pm', hour: 15 },
                        { label: '6pm', hour: 18 }, { label: '9pm', hour: 21 },
                    ];
                    for (const al of axisLabels) {
                        const lx = chartLeft + al.hour * (barWidth + barGap) + barWidth / 2;
                        svgContent += '<text x="' + lx + '" y="280" fill="currentColor" font-size="14" text-anchor="middle" dominant-baseline="central" font-weight="600" font-family="inherit">' + al.label + '</text>';
                    }

                    svg.innerHTML = svgContent;
                }

                if (history.length > 0) {
                    const sorted = [...history].sort((a, b) => a.date.localeCompare(b.date));
                    const dates = sorted.map(h => h.date);
                    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                    const lineColor = isDark ? '#e0e0e0' : '#333';
                    const fillColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
                    const gridColor = isDark ? '#1a1a1a' : '#e8e8e8';
                    const tickColor = isDark ? '#888' : '#888';
                    const chartOpts = {
                        responsive: true,
                        maintainAspectRatio: true,
                        aspectRatio: 3,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { ticks: { color: tickColor, maxTicksLimit: 10 }, grid: { color: gridColor } },
                            y: { ticks: { color: tickColor }, grid: { color: gridColor } },
                        },
                    };

                    new Chart(document.getElementById('tokenChart'), {
                        type: 'line',
                        data: {
                            labels: dates,
                            datasets: [{
                                data: sorted.map(h => h.tokens),
                                borderColor: lineColor,
                                backgroundColor: fillColor,
                                fill: true, tension: 0.3, pointRadius: 2,
                            }],
                        },
                        options: chartOpts,
                    });

                    new Chart(document.getElementById('messageChart'), {
                        type: 'line',
                        data: {
                            labels: dates,
                            datasets: [{
                                data: sorted.map(h => h.messages),
                                borderColor: lineColor,
                                backgroundColor: fillColor,
                                fill: true, tension: 0.3, pointRadius: 2,
                            }],
                        },
                        options: chartOpts,
                    });
                }

                document.title = `${profile.username || 'Anonymous'} - ClaudeRank`;
            } catch (err) {
                container.innerHTML = `<div class="loading" style="color:var(--red)">Error: ${err.message}</div>`;
            }
        }
    </script>
    <script>
        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            updateToggleLabel();
        }
        function updateToggleLabel() {
            const btn = document.getElementById('themeToggle');
            if (!btn) return;
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            btn.textContent = isDark ? 'light mode' : 'dark mode';
        }
        updateToggleLabel();
    </script>
    <script>
        function toggleMenu() {
            document.getElementById('headerNav').classList.toggle('open');
            document.getElementById('hamburgerBtn').classList.toggle('open');
        }
        document.addEventListener('click', function(e) {
            var nav = document.getElementById('headerNav');
            var btn = document.getElementById('hamburgerBtn');
            if (nav && nav.classList.contains('open') &&
                !nav.contains(e.target) && !btn.contains(e.target)) {
                nav.classList.remove('open');
                btn.classList.remove('open');
            }
        });
    </script>
