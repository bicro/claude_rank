    <div id="profileContent"><div class="loading">Loading profile</div></div>

    <script type="module">
        import { getUserProfile, getUserHistory, getAllBadges, getUserByUsername, getUserConcurrency, getUserConcurrencyByDate, getUserDailyRanks, getUserRewards, formatNumber, formatCost, formatPercentile, getCategoryLabel, getTier, animateValue } from './js/api.js?v=2';
        import { getCachedAvatar } from './js/avatar.js';

        function escHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

        const params = new URLSearchParams(window.location.search);
        const userHash = params.get('hash');
        const username = params.get('username');

        if (userHash) {
            loadProfile(userHash);
        } else if (username) {
            getUserByUsername(username).then(data => {
                loadProfile(data.user_hash);
            }).catch(err => {
                document.getElementById('profileContent').innerHTML =
                    `<div class="loading" style="color:var(--red)">User "${escHtml(username)}" not found</div>`;
            });
        } else {
            document.getElementById('profileContent').innerHTML =
                '<div class="loading" style="color:var(--red)">No user hash or username provided</div>';
        }

        function rankDisplay(rankObj) {
            if (!rankObj) return '';
            return `<div class="rank">#${rankObj.rank} &middot; Top ${formatPercentile(rankObj.percentile)}%</div>`;
        }

        function dailyRankDisplay(rankObj) {
            if (!rankObj) return '';
            return `<div class="daily-stat-rank">#${rankObj.rank} &middot; Top ${formatPercentile(rankObj.percentile)}%</div>`;
        }

        function renderDailySummary() {
            const s = window._dailySummary;
            if (!s) return;
            let text = '';
            if (!s.activeText && s.dayTokens === 0) {
                text = 'No activity recorded for this day.';
            } else {
                if (s.activeText) {
                    text += `You were active for a combined total of ${s.activeText}`;
                    if (s.activePercentile) text += `, putting you in the top ${formatPercentile(s.activePercentile)}%`;
                    text += '. ';
                }
                if (s.dayTokens > 0) {
                    text += `You burned ${formatNumber(s.dayTokens)} tokens, amounting to an estimated ${s.costText}.`;
                }
            }
            const el = document.getElementById('dailySummaryMain');
            if (el) el.textContent = text;
        }

        function renderProfileRewards(rewards) {
            if (!rewards) return;
            const mappings = [
                { key: 'daily_spend', el: 'rewardPillsSpend' },
                { key: 'peak_concurrency', el: 'rewardPillsConcurrency' },
                { key: 'hourly_streak', el: 'rewardPillsStreak' },
            ];
            for (const m of mappings) {
                const container = document.getElementById(m.el);
                if (!container) continue;
                container.innerHTML = '';

                const pb = rewards.personal_bests?.[m.key];
                const tr = rewards.team_ranks?.[m.key];
                const gt = rewards.global_tiers?.[m.key];

                if (pb?.is_new_record) {
                    const lbl = document.createElement('span');
                    lbl.className = 'reward-label personal';
                    lbl.textContent = pb.best === 0 ? 'First Record!' : 'New PB!';
                    container.appendChild(lbl);
                } else if (m.key === 'hourly_streak' && pb) {
                    const best = Math.max(pb.best ?? 0, pb.today ?? 0);
                    if (best > 0) {
                        const lbl = document.createElement('span');
                        lbl.className = 'reward-label personal';
                        lbl.textContent = `PB: ${best}h`;
                        container.appendChild(lbl);
                    }
                }
                if (tr?.rank === 1 && tr.total > 1) {
                    const lbl = document.createElement('span');
                    lbl.className = 'reward-label team';
                    lbl.textContent = '#1 on your team';
                    container.appendChild(lbl);
                }
                if (gt?.tier) {
                    const lbl = document.createElement('span');
                    lbl.className = `reward-label ${gt.tier}`;
                    const tierText = { top1: 'Top 1%', top10: 'Top 10%', top25: 'Top 25%', top50: 'Top 50%' };
                    lbl.textContent = tierText[gt.tier] || `Top ${gt.percentile.toFixed(0)}%`;
                    container.appendChild(lbl);
                }
            }
        }

        async function loadProfile(hash) {
            const container = document.getElementById('profileContent');
            try {
                const [profile, allBadges, history] = await Promise.all([
                    getUserProfile(hash),
                    getAllBadges(),
                    getUserHistory(hash, 30),
                ]);

                const m = profile.metrics;
                const ranks = profile.ranks || {};
                const tier = profile.tier || { tier: 'Bronze', next_tier: 'Silver', progress: 0 };
                const tierObj = getTier(m.weighted_score);
                const earnedIds = new Set(profile.badges.map(b => b.id));
                const initial = (profile.username || 'A')[0].toUpperCase();

                // XP progress: level = floor(sqrt(points/100)), next level at (level+1)^2 * 100
                const currentLevel = m.level || 0;
                const nextLevelPoints = (currentLevel + 1) * (currentLevel + 1) * 100;
                const prevLevelPoints = currentLevel * currentLevel * 100;
                const xpProgress = nextLevelPoints > prevLevelPoints
                    ? Math.min(((m.total_points - prevLevelPoints) / (nextLevelPoints - prevLevelPoints)) * 100, 100)
                    : 0;

                const avatarHtml = profile.avatar_url
                    ? `<img id="profileAvatar" alt="" class="profile-avatar" style="object-fit:cover">`
                    : `<div class="profile-avatar">${initial}</div>`;
                const displayName = profile.display_name && profile.auth_provider
                    ? profile.display_name
                    : (profile.username || 'Anonymous');

                // Social icon SVGs by provider
                const socialIcons = {
                    twitter: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',
                    github: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>',
                    linkedin: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>',
                };
                const socialIconHtml = profile.social_url && profile.auth_provider && socialIcons[profile.auth_provider]
                    ? ` <a href="${escHtml(profile.social_url)}" target="_blank" rel="noopener noreferrer" class="social-link" title="${profile.auth_provider === 'twitter' ? 'X' : profile.auth_provider.charAt(0).toUpperCase() + profile.auth_provider.slice(1)}">${socialIcons[profile.auth_provider]}</a>`
                    : '';

                container.innerHTML = `
                    <div class="profile-header">
                        ${avatarHtml}
                        <div class="profile-info">
                            <h2>${escHtml(displayName)}${socialIconHtml}
                                <span class="tier-badge tier-${tier.tier.toLowerCase()}" data-tooltip="Tier is based on your weighted score. Progress to ${tier.next_tier || 'max tier'}: ${Math.round(tier.progress || 0)}%.">${tierObj.icon} ${tier.tier}</span>
                                <span class="profile-overall-rank" id="profileOverallRank"></span>
                            </h2>
                            <div class="meta">
                                Joined ${new Date(profile.created_at).toLocaleDateString()}
                                ${profile.team_hash ? ` &middot; Team: <a href="/team.html?hash=${profile.team_hash}">${profile.team_hash}</a>` : ''}
                            </div>
                            <div class="xp-display" data-tooltip="XP is earned from tokens, messages, tool calls, and streaks. Level = floor(sqrt(points / 100)).">
                                <div class="xp-bar"><div class="xp-fill" style="width:${xpProgress.toFixed(1)}%"></div></div>
                                <div class="xp-text">Level ${currentLevel} &middot; ${formatNumber(m.total_points)} / ${formatNumber(nextLevelPoints)} XP</div>
                            </div>
                        </div>
                    </div>

                    <div class="profile-section-divider" style="padding-top:24px;" data-tooltip="Activity breakdown for a single day. Use the date arrows to navigate between days.">
                        <span>Daily</span>
                        <div class="burn-clock-card-date-nav" id="cardDateNav">
                            <button class="date-nav-btn" id="dayPrev" title="Previous day">&#9664;</button>
                            <span class="date-label" id="dayLabel">Today</span>
                            <button class="date-nav-btn" id="dayNext" title="Next day" disabled>&#9654;</button>
                        </div>
                    </div>

                    <div class="profile-section-constrained" id="dailyCardSection">
                        <div class="burn-clock-card-bg" data-tooltip="Session burn clock. Each bar is one hour of the day. Height = tokens burned, color intensity = activity level. Overlapping bars show concurrent sessions.">
                            <button class="copy-burn-btn copy-icon-btn burn-clock-copy-btn" id="copyConcurrency" title="Copy"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
                            <svg id="burnClockDailyMain" style="width:100%;height:auto;display:block;" viewBox="0 0 657 500"></svg>
                        </div>
                        <div class="copy-feedback" id="concurrencyFeedback">Copied to clipboard!</div>
                    </div>

                    <div class="profile-section-divider" data-tooltip="Cumulative stats across all time since this account was created."><span>Lifetime</span></div>

                    <div class="profile-stats-below">
                        <div class="stat-category" data-tooltip="Estimated cost based on per-model token pricing. Includes all input and output tokens across Claude models.">
                            <div class="stat-category-header">
                                <div class="stat-category-value" data-raw-cost="${m.estimated_spend || 0}">0</div>
                                <div class="stat-category-label">Total Estimated Spend</div>
                                <div class="reward-pills" id="rewardPillsSpend"></div>
                            </div>
                            <div class="stat-category-items">
                                <div class="stat-card" data-tooltip="Total input + output tokens consumed across all Claude models.">
                                    <div class="label">Total Tokens</div>
                                    <div class="value" data-raw="${m.total_tokens || 0}">0</div>
                                    ${rankDisplay(ranks.tokens)}
                                </div>
                                <div class="stat-card" data-tooltip="Total tool calls executed by Claude Code agents (file edits, bash commands, etc).">
                                    <div class="label">Tool Calls</div>
                                    <div class="value" data-raw="${m.total_tool_calls || 0}">0</div>
                                    ${rankDisplay(ranks.tools)}
                                </div>
                            </div>
                        </div>
                        <div class="stat-category" data-tooltip="Peak number of Claude Code sessions running at the same time today.">
                            <div class="stat-category-header">
                                <div class="stat-category-value" data-raw="${m.max_concurrent || 0}">${m.max_concurrent ? '0' : '\u2014'}</div>
                                <div class="stat-category-label">Max Concurrent Agents</div>
                                <div class="reward-pills" id="rewardPillsConcurrency"></div>
                            </div>
                            <div class="stat-category-items">
                                <div class="stat-card" data-tooltip="Total number of Claude Code sessions started.">
                                    <div class="label">Sessions</div>
                                    <div class="value" data-raw="${m.total_sessions || 0}">0</div>
                                </div>
                                <div class="stat-card" data-tooltip="Minutes spent running 2 or more Claude Code sessions simultaneously.">
                                    <div class="label">Concurrent Mins</div>
                                    <div class="value" data-raw-mins="${m.concurrent_mins || 0}">${m.concurrent_mins > 0 ? '0' : '\u2014'}</div>
                                </div>
                                <div class="stat-card" data-tooltip="Total prompts you sent to Claude across all sessions.">
                                    <div class="label">Messages</div>
                                    <div class="value" data-raw="${m.total_messages || 0}">0</div>
                                    ${rankDisplay(ranks.messages)}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="profile-badges">
                        <div class="badges-grid">
                            ${allBadges.map(b => `
                                <div class="badge-card ${earnedIds.has(b.id) ? '' : 'locked'}">
                                    <div class="icon">${b.icon || '?'}</div>
                                    <div class="name">${b.name}</div>
                                    <div class="desc">${b.description}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    ${history.length > 0 ? `
                    <div class="profile-section-constrained profile-charts">
                        <div class="chart-container" data-tooltip="Cumulative token count over the last 30 days. Shows how fast you're burning through tokens.">
                            <h3>Token Growth (Last 30 Days)</h3>
                            <canvas id="tokenChart"></canvas>
                        </div>
                        <div class="chart-container" data-tooltip="Daily message count over the last 30 days. Each bar is one day's total messages.">
                            <h3>Messages Over Time</h3>
                            <canvas id="messageChart"></canvas>
                        </div>
                    </div>
                    ` : ''}
                `;

                // Load cached avatar
                let cachedAvatarDataUrl = null;
                if (profile.avatar_url) {
                    cachedAvatarDataUrl = await getCachedAvatar(profile.avatar_url);
                    const img = document.getElementById('profileAvatar');
                    if (img && cachedAvatarDataUrl) img.src = cachedAvatarDataUrl;
                }

                // Load team name for card subtitles
                let cachedTeamName = '';
                if (profile.team_hash) {
                    try {
                        const t = await fetch(`/api/teams/${profile.team_hash}`).then(r => r.json());
                        cachedTeamName = t.team_name || '';
                    } catch (e) {}
                }

                // Animate stat values from 0 to target
                requestAnimationFrame(() => {
                    container.querySelectorAll('[data-raw]').forEach(el => {
                        const target = parseInt(el.getAttribute('data-raw'), 10);
                        if (target > 0) animateValue(el, 0, target, formatNumber);
                    });
                    container.querySelectorAll('[data-raw-cost]').forEach(el => {
                        const target = Math.round(parseFloat(el.getAttribute('data-raw-cost')) * 100);
                        if (target > 0) animateValue(el, 0, target, v => formatCost(v / 100));
                    });
                    container.querySelectorAll('[data-raw-mins]').forEach(el => {
                        const target = parseInt(el.getAttribute('data-raw-mins'), 10);
                        if (target > 0) animateValue(el, 0, target, v => v + 'm');
                    });
                });

                // Load and render burn clock visualization with day navigation
                let burnClockDayData = [];
                let burnDayOffset = 0;
                let weekConcurrencyCache = {};
                let prevDayTokens = 0, prevCostRaw = 0;
                let prevMaxSessions = 0, prevDevMins = 0, prevConcMins = 0;

                function formatDateISO(d) { return d.toISOString().split('T')[0]; }
                function localDateISO(d) {
                    return d.getFullYear() + '-' +
                        String(d.getMonth() + 1).padStart(2, '0') + '-' +
                        String(d.getDate()).padStart(2, '0');
                }
                function utcDatesForLocalDay(localDateStr) {
                    const localMidnight = new Date(localDateStr + 'T00:00:00');
                    const dates = new Set();
                    for (let h = 0; h < 24; h++) {
                        const t = new Date(localMidnight.getTime() + h * 3600000);
                        dates.add(t.toISOString().split('T')[0]);
                    }
                    return [...dates];
                }
                function dateForOffset(offset) {
                    const d = new Date();
                    d.setDate(d.getDate() + offset);
                    return d;
                }
                const MONTH_NAMES = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
                function formatDayLabel(offset) {
                    if (offset === 0) return 'TODAY';
                    const d = dateForOffset(offset);
                    return `${MONTH_NAMES[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
                }


                async function fetchDayConcurrency(localDateStr) {
                    if (weekConcurrencyCache[localDateStr]) return weekConcurrencyCache[localDateStr];
                    const utcDates = utcDatesForLocalDay(localDateStr);
                    const results = await Promise.all(utcDates.map(d => getUserConcurrencyByDate(hash, d)));
                    // Collect sessions from all UTC dates before merging
                    let allSessions = [];
                    for (const r of results) {
                        if (r.sessions && Array.isArray(r.sessions)) {
                            allSessions = allSessions.concat(r.sessions);
                        }
                    }
                    const data = Object.assign({}, ...results);
                    data.sessions = allSessions;
                    weekConcurrencyCache[localDateStr] = data;
                    return data;
                }

                async function loadBurnClockDay(offset) {
                    burnDayOffset = offset;
                    const targetDate = dateForOffset(offset);

                            // Populate rank row

                                const svgMain = document.getElementById('burnClockDailyMain');

                document.getElementById('dayPrev').addEventListener('click', () => {

                loadBurnClockDay(0);

                // Burn clock rendering functions
                function processHourlyData(allHistograms, localDateStr) {
                    const hourlyData = [];
                    const localMidnight = new Date(localDateStr + 'T00:00:00');
                    const now = new Date();
                    const isToday = localDateStr === localDateISO(now);

                    for (let h = 0; h < 24; h++) {
                        const t = new Date(localMidnight.getTime() + h * 3600000);
                        const utcDate = t.toISOString().split('T')[0];
                        const utcHour = t.getUTCHours();
                        const key = utcDate + ':' + utcHour;

                        const raw = allHistograms[key];
                        const histogramOrPeak = (typeof raw === 'object' && raw !== null && raw.histogram) ? raw.histogram : raw;
                        const sessions = [];

                        if (typeof histogramOrPeak === 'object' && histogramOrPeak !== null) {
                            for (let n = 1; n <= 7; n++) {
                                let totalMins = 0;
                                for (const [conc, mins] of Object.entries(histogramOrPeak)) {
                                    if (parseInt(conc, 10) >= n) totalMins += mins;
                                }
                                if (totalMins > 0) {
                                    const seed = (h * 7 + n * 13) % 17;
                                    const variation = 0.85 + (seed / 17) * 0.15;
                                    const intensity = Math.min((totalMins / 60) * variation, 1);
                                    sessions.push({ index: n, intensity, minutes: totalMins });
                                }
                            }
                        } else if (typeof histogramOrPeak === 'number' && histogramOrPeak > 0) {
                            for (let n = 1; n <= histogramOrPeak; n++) {
                                const seed = (h * 7 + n * 13) % 17;
                                const intensity = 0.5 + (seed / 17) * 0.5;
                                sessions.push({ index: n, intensity, minutes: 30 });
                            }
                        }

                        const isCurrent = isToday && h === now.getHours();

                        hourlyData.push({
                            hour: h,
                            sessions,
                            isCurrent,
                            date: t
                        });
                    }
                    return hourlyData;
                }

                function getBurnColor(intensity) {
                    const r1 = 252, g1 = 240, b1 = 228;
                    const r2 = 204, g2 = 88, b2 = 28;
                    const r = Math.round(r1 + (r2 - r1) * intensity);
                    const g = Math.round(g1 + (g2 - g1) * intensity);
                    const b = Math.round(b1 + (b2 - b1) * intensity);
                    return `rgb(${r},${g},${b})`;
                }

                function formatHour(h) {
                    const period = h < 12 ? 'AM' : 'PM';
                    const displayH = h % 12 === 0 ? 12 : h % 12;
                    return displayH + ' ' + period;
                }

                function formatDateHour(date) {
                    const h = date.getHours();
                    const period = h < 12 ? 'AM' : 'PM';
                    const displayH = h % 12 === 0 ? 12 : h % 12;
                    const dateStr = date.toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric' });
                    return dateStr + ', ' + displayH + ' ' + period;
                }

                function renderHeatmapGrid(svg, hourlyData, isWeekly, sessions, options) {
                    sessions = sessions || [];
                    options = options || {};
                    const cellW = 30, cellH = 30, gap = 4;
                    const marginLeft = 44, marginTop = 196;
                    const minRows = 5;
                    const isDarkTheme = document.documentElement.getAttribute('data-theme') === 'dark';
                    const emptyCellColor = isDarkTheme ? '#232323' : '#e0ddd9';
                    const labelColor = isDarkTheme ? '#999999' : '#8a8480';

                    let svgContent = '';
                    let maxSessions = 0;

                    // First pass: find peak concurrency
                    for (const data of hourlyData) {
                        if (data.sessions.length > maxSessions) maxSessions = data.sessions.length;
                    }
                    const maxRows = Math.max(minRows, maxSessions);

                    // Update viewBox dynamically
                    const gridHeight = maxRows * (cellH + gap) - gap;
                    const totalHeight = marginTop + gridHeight + 28;
                    const totalWidth = marginLeft + 24 * (cellW + gap) - gap;
                    svg.setAttribute('viewBox', `0 0 ${totalWidth} ${totalHeight}`);

                    // Draw grid cells
                    for (let col = 0; col < 24; col++) {
                        const data = hourlyData[col];

                        const tooltipText = isWeekly
                            ? formatDateHour(data.date) + ': ' + data.sessions.length + ' avg session' + (data.sessions.length !== 1 ? 's' : '')
                            : formatDateHour(data.date) + ': ' + data.sessions.length + ' session' + (data.sessions.length !== 1 ? 's' : '');

                        // Draw empty background cells
                        for (let row = 0; row < maxRows; row++) {
                            const x = marginLeft + col * (cellW + gap);
                            const y = marginTop + (maxRows - 1 - row) * (cellH + gap);
                            svgContent += `<rect x="${x}" y="${y}" width="${cellW}" height="${cellH}" rx="3" ry="3" fill="${emptyCellColor}" opacity="0.8" />`;
                        }

                        // Draw filled cells
                        for (const session of data.sessions) {
                            if (session.index > maxRows) continue;
                            const row = session.index - 1;
                            const x = marginLeft + col * (cellW + gap);
                            const y = marginTop + (maxRows - 1 - row) * (cellH + gap);
                            const color = options.solidColor || getBurnColor(session.intensity);

                            svgContent += `<rect class="burn-pill" x="${x}" y="${y}" width="${cellW}" height="${cellH}" rx="3" ry="3" fill="${color}" data-hour="${data.hour}" data-sessions="${data.sessions.length}">
                                <title>${tooltipText}</title>
                            </rect>`;
                        }
                    }

                    // X-axis labels (3 uppercase, matching widget/shareable style)
                    const xAxisY = marginTop + maxRows * (cellH + gap) + 12;
                    const fmtHr = (h) => { const hh = ((h % 24) + 24) % 24; return hh === 0 ? '12AM' : hh < 12 ? hh + 'AM' : hh === 12 ? '12PM' : (hh - 12) + 'PM'; };
                    svgContent += `<text x="${marginLeft}" y="${xAxisY}" fill="${labelColor}" font-size="11" font-family="inherit">${fmtHr(0)}</text>`;
                    svgContent += `<text x="${marginLeft + 12 * (cellW + gap)}" y="${xAxisY}" fill="${labelColor}" font-size="11" font-family="inherit">${fmtHr(12)}</text>`;
                    svgContent += `<text x="${marginLeft + 23 * (cellW + gap)}" y="${xAxisY}" fill="${labelColor}" font-size="11" font-family="inherit" text-anchor="end">${fmtHr(23)}</text>`;

                    // Y-axis: label the highest active concurrency row
                    if (maxSessions > 0) {
                        const peakRow = maxSessions - 1;
                        const peakY = marginTop + (maxRows - 1 - peakRow) * (cellH + gap) + cellH / 2;
                        svgContent += `<text x="${marginLeft - 8}" y="${peakY}" text-anchor="end" dominant-baseline="middle" fill="${labelColor}" font-size="11" font-family="inherit">${maxSessions}x</text>`;
                    }

                    // Mini terminal UIs - one per concurrent session
                    const termW = 180, termH = 110;
                    const termGap = 12;
                    const termY = 48;
                    const displayCount = maxSessions || 0;
                    const termStartX = marginLeft;
                    for (let i = 0; i < displayCount; i++) {
                        const tx = termStartX + i * (termW + termGap);
                        const titleBarH = 22;
                        // Window frame
                        svgContent += `<rect x="${tx}" y="${termY}" width="${termW}" height="${termH}" rx="6" ry="6" fill="#1a1a1a" stroke="#333" stroke-width="0.5" />`;
                        // Title bar
                        svgContent += `<rect x="${tx}" y="${termY}" width="${termW}" height="${titleBarH}" rx="6" ry="6" fill="#2a2a2a" />`;
                        svgContent += `<rect x="${tx}" y="${termY + 16}" width="${termW}" height="6" fill="#2a2a2a" />`;
                        // Traffic light dots
                        svgContent += `<circle cx="${tx + 12}" cy="${termY + 11}" r="3.5" fill="#FF5F57" />`;
                        svgContent += `<circle cx="${tx + 24}" cy="${termY + 11}" r="3.5" fill="#FFBD2E" />`;
                        svgContent += `<circle cx="${tx + 36}" cy="${termY + 11}" r="3.5" fill="#28CA41" />`;
                        // Terminal content: show per-session stats or placeholder
                        const ringSessions = sessions.filter(s => s.ring === i);
                        svgContent += `<text x="${tx + 12}" y="${termY + 40}" font-size="12" font-family="monospace" fill="#aaa">$ claude</text>`;
                        if (ringSessions.length > 0) {
                            const totalTokens = ringSessions.reduce((sum, s) => sum + (s.tokens || 0), 0);
                            const totalMsgs = ringSessions.reduce((sum, s) => sum + (s.messages || 0), 0);
                            let totalMins = 0;
                            for (const s of ringSessions) totalMins += (s.end || 0) - (s.start || 0);
                            const dH = Math.floor(totalMins / 60);
                            const dM = Math.round(totalMins % 60);
                            const durText = dH > 0 ? `${dH}h ${dM}m active` : `${dM}m active`;
                            svgContent += `<text x="${tx + 16}" y="${termY + 56}" font-size="11" font-family="monospace" fill="#7a7a7a">${formatNumber(totalTokens)} tokens</text>`;
                            svgContent += `<text x="${tx + 16}" y="${termY + 70}" font-size="11" font-family="monospace" fill="#7a7a7a">${totalMsgs} messages</text>`;
                            svgContent += `<text x="${tx + 16}" y="${termY + 84}" font-size="11" font-family="monospace" fill="#7a7a7a">${durText}</text>`;
                        } else {
                            svgContent += `<rect x="${tx + 12}" y="${termY + 52}" width="${termW * 0.65}" height="4" rx="2" fill="#444" />`;
                            svgContent += `<rect x="${tx + 12}" y="${termY + 62}" width="${termW * 0.4}" height="4" rx="2" fill="#3a3a3a" />`;
                            svgContent += `<rect x="${tx + 12}" y="${termY + 72}" width="${termW * 0.55}" height="4" rx="2" fill="#333" />`;
                            svgContent += `<rect x="${tx + 12}" y="${termY + 82}" width="${termW * 0.35}" height="4" rx="2" fill="#2e2e2e" />`;
                            svgContent += `<rect x="${tx + 12}" y="${termY + 92}" width="${termW * 0.5}" height="4" rx="2" fill="#2a2a2a" />`;
                        }
                    }

                    // Header text above terminals
                    if (maxSessions > 0) {
                        svgContent += `<text x="${marginLeft}" y="16" fill="${isDarkTheme ? '#e0e0e0' : '#1a1a1a'}" font-size="16" font-weight="700" font-family="inherit" opacity="0.8">You ran ${maxSessions} concurrent terminal${maxSessions !== 1 ? 's' : ''}</text>`;
                        svgContent += `<text id="concurrencyPercentile" x="${marginLeft}" y="32" fill="${labelColor}" font-size="12" font-family="inherit" opacity="0"></text>`;
                    }

                    // Title just above grid, beneath terminals, with inline legend
                    svgContent += `<text x="${marginLeft}" y="${marginTop - 8}" text-anchor="start" dominant-baseline="auto" fill="${isDarkTheme ? '#e0e0e0' : '#1a1a1a'}" font-size="18" font-weight="700" font-family="inherit" opacity="0.7">Activity Heatmap</text>`;
                    if (!options.solidColor) {
                        const legendX = marginLeft + 180;
                        const legendY = marginTop - 20;
                        svgContent += `<defs><linearGradient id="heatLegendGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#FCF0E4"/><stop offset="100%" stop-color="#CC581C"/></linearGradient></defs>`;
                        svgContent += `<text x="${legendX}" y="${legendY + 11}" fill="${labelColor}" font-size="11" font-family="inherit">~10 min</text>`;
                        svgContent += `<rect x="${legendX + 50}" y="${legendY}" width="80" height="12" rx="2" fill="url(#heatLegendGrad)"/>`;
                        svgContent += `<text x="${legendX + 136}" y="${legendY + 11}" fill="${labelColor}" font-size="11" font-family="inherit">~60 min</text>`;
                    }

                    svg.innerHTML = svgContent;
                    return maxSessions;
                }

                function renderShareableCardV5(svg, hourlyData, sessions, cardData) {

                    const sColors = ['#E8692D', '#1a1a1a', '#1a1a1a'];

                        '<path d="M12 1C9.2 6.4 5 10.5 5 15a7 7 0 0 0 14 0c0-4.5-4.2-8.6-7-14zm0 19a3 3 0 0 1-3-3c0-2 1.5-3.5 3-5.5 1.5 2 3 3.5 3 5.5a3 3 0 0 1-3 3z" fill="#8a8480"/>',
                        '<rect x="2" y="3" width="20" height="18" rx="2" fill="none" stroke="#8a8480" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="6 9 10 13 6 17" fill="none" stroke="#8a8480" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="17" x2="18" y2="17" fill="none" stroke="#8a8480" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>',
                        '<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="none" stroke="#8a8480" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
                    ];
                    const iconSz = 14, iconGap = 4;
                    for (let i = 0; i < 3; i++) {
                        const cx = 30 + colW * i + colW / 2;
                        const textW = sLabels[i].length * 11;
                        const groupW = iconSz + iconGap + textW;
                        const groupX = cx - groupW / 2;
                        s += `<svg x="${groupX}" y="${statsY + 13}" width="${iconSz}" height="${iconSz}" viewBox="0 0 24 24">${sIcons[i]}</svg>`;
                        s += `<text x="${groupX + iconSz + iconGap}" y="${statsY + 26}" fill="#8a8480" font-size="16" font-weight="700" letter-spacing="1.5" text-anchor="start">${sLabels[i]}</text>`;
                        s += `<text x="${cx}" y="${statsY + 62}" fill="${sColors[i]}" font-size="36" font-weight="700" text-anchor="middle">${sValues[i]}</text>`;
                        if (i < 2) {
                            const divX = 30 + colW * (i + 1);
                            s += `<line x1="${divX}" y1="${statsY + 8}" x2="${divX}" y2="${statsY + statsHeight - 8}" stroke="#c8c0b8" stroke-width="1"/>`;
                        }
                    }

                    s += `<line x1="30" y1="${divider3Y}" x2="${cardW - 30}" y2="${divider3Y}" stroke="#c8c0b8" stroke-width="1"/>`;
                    s += `<text x="${cardW / 2}" y="${footerY}" fill="#8a8480" font-size="18" font-weight="600" letter-spacing="2" text-anchor="middle">CLAUDERANK.COM</text>`;
                    s += `</svg>`;

                    // SVG → canvas → clipboard (2x for retina)
                    const svgBlob = new Blob([s], { type: 'image/svg+xml;charset=utf-8' });
                    const svgUrl = URL.createObjectURL(svgBlob);
                    const img = new Image();
                    await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; img.src = svgUrl; });
                    const canvas = document.createElement('canvas');
                    canvas.width = cardW * 2;
                    canvas.height = cardH * 2;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, cardW * 2, cardH * 2);
                    URL.revokeObjectURL(svgUrl);

                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                }

                function renderBurnClockV2(concurrencyHistogram, username, localDateStr, yesterdayConcurrency, yesterdayStr, isToday, displayName) {
                    const hourlyData = processHourlyData(concurrencyHistogram, localDateStr);
                    burnClockDayData = hourlyData;

                    const sessions = concurrencyHistogram.sessions || [];

                    // Compute accurate token total from per-hour concurrency data (timezone-correct)
                    const localMidnight = new Date(localDateStr + 'T00:00:00');
                    let dayTokens = 0;
                    for (let h = 0; h < 24; h++) {
                        const t = new Date(localMidnight.getTime() + h * 3600000);
                        const utcDate = t.toISOString().split('T')[0];
                        const utcHour = t.getUTCHours();
                        const key = utcDate + ':' + utcHour;
                        const entry = concurrencyHistogram[key];
                        if (entry && entry.tokens) dayTokens += entry.tokens;
                    }
                    const totalTokens = m.total_tokens || 0;
                    const totalCost = m.estimated_spend || 0;
                    let costText = '$0';
                    if (totalTokens > 0 && dayTokens > 0 && totalCost > 0) {
                        costText = formatCost(totalCost * (dayTokens / totalTokens));
                    }
                    let activeMins = 0;
                    for (const d of hourlyData) {
                        const s1 = d.sessions.find(s => s.index === 1);
                        if (s1) activeMins += s1.minutes;
                    }
                    const ah = Math.floor(activeMins / 60);
                    const am = Math.round(activeMins % 60);
                    const activeText = activeMins > 0 ? (ah > 0 ? ah + 'h ' + am + 'm' : am + 'm') : null;
                    window._dailySummary = { activeText, dayTokens, costText };
                    renderDailySummary();

                    // Use the same 0-23 local day data for today and past days
                    let cardHourlyData = hourlyData;
                    let cardActiveMins = 0;
                    for (const d of cardHourlyData) {
                        const s1 = d.sessions.find(s => s.index === 1);
                        if (s1) cardActiveMins += s1.minutes;
                    }
                    let displayCostText = '$0';
                    if (totalTokens > 0 && dayTokens > 0 && totalCost > 0) {
                        displayCostText = formatCost(totalCost * (dayTokens / totalTokens));
                    }
                    // Compute peak consecutive active hours for the day
                    let peakStreak = 0, curStreak = 0;
                    for (const d of cardHourlyData) {
                        if (d.sessions.length > 0) { curStreak++; if (curStreak > peakStreak) peakStreak = curStreak; }
                        else curStreak = 0;
                    }

                    const cardData = {
                        username: username,
                        displayName: displayName || username,
                        teamName: cachedTeamName,
                        localDateStr: localDateStr,
                        activeMins: cardActiveMins,
                        dayTokens: dayTokens,
                        costText: displayCostText,
                        peakRank: null,
                        peakPercentile: null,
                        isToday: isToday,
                        avatarDataUrl: cachedAvatarDataUrl,
                        peakStreak: peakStreak,
                    };

                    // Store for theme-toggle re-render
                    window._burnClockRenderArgs = { cardHourlyData, sessions, cardData };

                    // Compute raw stat values for animation
                    let cardMaxSessions = 0;
                    for (const d of cardHourlyData) {
                        if (d.sessions.length > cardMaxSessions) cardMaxSessions = d.sessions.length;
                    }
                    let cardTotalDevMins = 0;
                    for (const d of cardHourlyData) {
                        for (const sess of d.sessions) cardTotalDevMins += sess.minutes;
                    }
                    let cardConcurrentMins = 0;
                    for (const d of cardHourlyData) {
                        const s2 = d.sessions.find(s => s.index === 2);
                        if (s2) cardConcurrentMins += s2.minutes;
                    }

                    // Theme-aware dispatch: V5 for light, V6 for dark
                    const svgMain = document.getElementById('burnClockDailyMain');
                    if (svgMain) {
                        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                        isDark ? renderShareableCardV6(svgMain, cardHourlyData, sessions, cardData)
                               : renderShareableCardV5(svgMain, cardHourlyData, sessions, cardData);

                        // Animate concurrent agents (stat1 in new layout)
                        const stat1 = document.getElementById('v5Stat1');
                        if (stat1) animateValue(stat1, prevMaxSessions, cardMaxSessions, v => v + '\u00d7');
                        prevMaxSessions = cardMaxSessions;
                    }
                }

                // Re-render burn clock on theme toggle
                const themeObserver = new MutationObserver(() => {
                    if (window._burnClockRenderArgs) {
                        const { cardHourlyData, sessions, cardData } = window._burnClockRenderArgs;
                        const svgMain = document.getElementById('burnClockDailyMain');
                        if (svgMain) {
                            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                            isDark ? renderShareableCardV6(svgMain, cardHourlyData, sessions, cardData)
                                   : renderShareableCardV5(svgMain, cardHourlyData, sessions, cardData);
                        }
                    }
                });
                themeObserver.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

                if (history.length > 0) {
                    const sorted = [...history].sort((a, b) => a.date.localeCompare(b.date));
                    const dates = sorted.map(h => h.date);
                    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                    const lineColor = '#E8692D';
                    const fillColor = 'rgba(232,105,45,0.08)';
                    const gridColor = isDark ? '#2a2a2a' : '#e8e8e8';
                    const tickColor = '#8a8480';
                    const chartOpts = {
                        responsive: true,
                        maintainAspectRatio: true,
                        aspectRatio: 3,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { ticks: { color: tickColor, maxTicksLimit: 10 }, grid: { color: gridColor } },
                            y: { ticks: { color: tickColor }, grid: { color: gridColor } },
                        },
                    };

                    new Chart(document.getElementById('tokenChart'), {
                        type: 'line',
                        data: {
                            labels: dates,
                            datasets: [{
                                data: sorted.map(h => h.tokens),
                                borderColor: lineColor,
                                backgroundColor: fillColor,
                                fill: true, tension: 0.3, pointRadius: 2,
                            }],
                        },
                        options: chartOpts,
                    });

                    new Chart(document.getElementById('messageChart'), {
                        type: 'line',
                        data: {
                            labels: dates,
                            datasets: [{
                                data: sorted.map(h => h.messages),
                                borderColor: lineColor,
                                backgroundColor: fillColor,
                                fill: true, tension: 0.3, pointRadius: 2,
                            }],
                        },
                        options: chartOpts,
                    });
                }

                document.title = `${displayName} - ClaudeRank`;
            } catch (err) {
                container.innerHTML = `<div class="loading" style="color:var(--red)">Error: ${escHtml(err.message)}</div>`;
            }
        }
    </script>
    <script>
        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            updateToggleLabel();
        }
        function updateToggleLabel() {
            const btn = document.getElementById('themeToggle');
            if (!btn) return;
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            btn.textContent = isDark ? 'light mode' : 'dark mode';
        }
        updateToggleLabel();
    </script>

    <script>
        function toggleMenu() {
            document.getElementById('headerNav').classList.toggle('open');
            document.getElementById('hamburgerBtn').classList.toggle('open');
        }
        document.addEventListener('click', function(e) {
            var nav = document.getElementById('headerNav');
            var btn = document.getElementById('hamburgerBtn');
            if (nav && nav.classList.contains('open') &&
                !nav.contains(e.target) && !btn.contains(e.target)) {
                nav.classList.remove('open');
                btn.classList.remove('open');
            }
        });
    </script>
    <script>
    (function() {
        var tip = document.createElement('div');
        tip.className = 'cr-tooltip';
        tip.innerHTML = '<div class="cr-tooltip-body"></div>';
        document.body.appendChild(tip);
        var body = tip.querySelector('.cr-tooltip-body');
        var showTimeout, typeTimer, fullText = '', charIdx = 0;

        function stopTyping() {
            clearInterval(typeTimer);
            typeTimer = null;
        }
        function startTyping(text) {
            stopTyping();
            fullText = text;
            charIdx = 0;
            body.innerHTML = '<span class="cr-cursor"></span>';
            typeTimer = setInterval(function() {
                if (charIdx >= fullText.length) { stopTyping(); return; }
                var cursor = body.querySelector('.cr-cursor');
                if (cursor) cursor.remove();
                body.insertAdjacentText('beforeend', fullText[charIdx]);
                body.insertAdjacentHTML('beforeend', '<span class="cr-cursor"></span>');
                charIdx++;
            }, 18);
        }
        document.addEventListener('mouseover', function(e) {
            var el = e.target.closest('[data-tooltip]');
            if (!el) return;
            clearTimeout(showTimeout);
            var text = el.getAttribute('data-tooltip');
            tip.style.left = e.clientX + 14 + 'px';
            tip.style.top = e.clientY + 14 + 'px';
            showTimeout = setTimeout(function() {
                tip.classList.add('visible');
                startTyping(text);
            }, 80);
        });
        document.addEventListener('mousemove', function(e) {
            if (!tip.classList.contains('visible') && !showTimeout) return;
            var x = e.clientX + 14, y = e.clientY + 14;
            if (x + 290 > window.innerWidth) x = e.clientX - 290;
            if (y + 80 > window.innerHeight) y = e.clientY - 80;
            tip.style.left = x + 'px';
            tip.style.top = y + 'px';
        });
        document.addEventListener('mouseout', function(e) {
            var el = e.target.closest('[data-tooltip]');
            if (!el) return;
            clearTimeout(showTimeout);
            showTimeout = null;
            stopTyping();
            tip.classList.remove('visible');
            body.innerHTML = '';
        });
    })();
    </script>
</body>
