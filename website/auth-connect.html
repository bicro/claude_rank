<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect Account - ClaudeRank</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    background: #fafafa;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    padding: 40px;
    max-width: 380px;
    width: 100%;
    text-align: center;
  }
  .logo { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #8a8480; margin-bottom: 24px; }
  h2 { font-size: 18px; margin-bottom: 8px; }
  p { font-size: 13px; color: #8a8480; margin-bottom: 24px; }
  .providers { display: flex; flex-direction: column; gap: 10px; }
  .provider-btn {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px; border: 1px solid #e0ddd9; border-radius: 10px;
    background: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: background 0.15s;
    text-decoration: none; color: #1a1a1a;
  }
  .provider-btn:hover { background: #f5f0eb; text-decoration: none; }
  .provider-btn svg { flex-shrink: 0; }
  .success { display: none; }
  .success h2 { color: #16a34a; }
  .success p { margin-top: 12px; }
</style>
</head>
<body>

<div class="card" id="loginCard">
  <div class="logo">CLAUDERANK</div>
  <h2>Connect Your Account</h2>
  <p>Link a social account to your ClaudeRank profile</p>

      Google
    </button>
    <button class="provider-btn" onclick="connect('twitter')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#1a1a1a"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>

    </button>

      Discord
    </button>
    <button class="provider-btn" onclick="connect('linkedin')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#0A66C2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>

      GitHub
    </button>
  </div>
</div>

<div class="card success" id="successCard">
  <div class="logo">CLAUDERANK</div>
  <h2>Connected!</h2>
  <p id="successName"></p>
  <p>You can close this tab and return to the desktop app.</p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const userHash = params.get('user_hash');

  if (!userHash) {
    document.querySelector('.card').innerHTML = '<p style="color:#ef4444">Missing user_hash parameter</p>';
  }

  async function connect(provider) {
    const callbackURL = window.location.origin + '/auth-connected.html?user_hash=' + encodeURIComponent(userHash) + '&provider=' + provider;
    const res = await fetch('/api/auth/sign-in/social', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ provider, callbackURL }),
    });
    const data = await res.json();
    if (data?.url) {
      window.location.href = data.url;
    }
  }

  // Auto-start if provider is specified (from desktop widget)
  const autoProvider = params.get('provider');
  if (autoProvider && userHash) {
    connect(autoProvider);
  }
</script>
</body>
</html>
