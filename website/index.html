    <div id="hotUsersSection"></div>

    <div style="max-width:1200px;margin:0 auto;padding:60px 24px 0">
        <h2 style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text-secondary);padding-bottom:12px;border-bottom:1px solid var(--border, #e0ddd9);margin-bottom:0">Global Rankings</h2>
    </div>
    <div id="topCategories" class="top-categories">
        <div class="loading">Loading leaderboards</div>
    </div>

    <script type="module">
        import { getLeaderboard, getHotUsers, formatNumber, formatCost, getCategoryLabel, getCategoryIcon, CATEGORIES, getTier } from './js/api.js?v=2';

        async function loadLanding() {
            const container = document.getElementById('topCategories');
            const cards = [];

            const results = await Promise.allSettled(
                CATEGORIES.map(cat => getLeaderboard(cat, 'individual', 3, 0))
            );

            for (let i = 0; i < CATEGORIES.length; i++) {
                const cat = CATEGORIES[i];
                const result = results[i];
                const label = getCategoryLabel(cat);
                const icon = getCategoryIcon(cat);

                let entriesHtml = '';
                if (result.status === 'fulfilled' && result.value.entries.length > 0) {
                    entriesHtml = result.value.entries.map((e, idx) => `
                        <div class="top-entry">
                            <div class="top-rank top-rank-${idx + 1}">${idx + 1}</div>
                            <div class="top-entry-info">
                                <div class="top-entry-name">
                                    <a href="/profile.html?hash=${e.user_hash}">${e.username || 'Anonymous'}</a>
                                </div>
                                <div class="top-entry-value">${cat === 'cost' ? formatCost(e.value) : formatNumber(e.value)}</div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    entriesHtml = '<div class="top-entry"><div class="top-entry-info" style="color:var(--text-secondary)">No data yet</div></div>';
                }

                cards.push(`
                    <div class="category-card">
                        <div class="category-card-header">
                            <h3>${icon} ${label}</h3>
                            <a href="/leaderboard.html?category=${cat}">View all &rarr;</a>
                        </div>
                        ${entriesHtml}
                    </div>
                `);
            }

            container.innerHTML = cards.join('');
        }

        async function loadHotUsers() {
            try {
                const data = await getHotUsers(10);
                if (!data.users || data.users.length === 0) return;
                const container = document.getElementById('hotUsersSection');
                const cards = data.users.map(u => {
                    const tier = getTier(u.weighted_score);
                    return `
                        <div class="hot-user-card">
                            <div class="hot-user-streak">\u{1f525} ${u.current_streak}d</div>
                            <div class="hot-user-name">
                                <a href="/profile.html?hash=${u.user_hash}">${u.username || 'Anonymous'}</a>
                            </div>
                            <div class="hot-user-meta">
                                <span>${tier.icon}</span>
                                <span>Lv.${u.level}</span>
                            </div>
                        </div>
                    `;
                }).join('');
                container.innerHTML = `
                    <section class="hot-users-section">
                        <h3>\u{1f525} Hot Right Now</h3>
                        <div class="hot-users-scroll">${cards}</div>
                    </section>
                `;
            } catch (e) {
                // Silent fail — hot users is optional
            }
        }

        loadHotUsers();
        loadLanding();

        window.findMe = function() {
            const val = document.getElementById('findInput').value.trim();
            if (!val) return;
            // If it looks like a UUID, go to profile by hash
            if (val.includes('-') && val.length > 20) {
                window.location.href = `/profile.html?hash=${encodeURIComponent(val)}`;
            } else {
                // Search by username — redirect to profile page which will handle lookup
                window.location.href = `/profile.html?username=${encodeURIComponent(val)}`;
            }
        };
    </script>
    <script>
        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            updateToggleLabel();
        }
        function updateToggleLabel() {
            const btn = document.getElementById('themeToggle');
            if (!btn) return;
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            btn.textContent = isDark ? 'light mode' : 'dark mode';
        }
        updateToggleLabel();
    </script>
    <script>
        (function() {
            const phrases = [
                "Find out how much Anthropic money you're burning.",
                "Competitive Claude Code is here.",
                "Competitive vibe coding before GTA6",
                "That's why I quit vibe coding...too many sweats",
                "It's literally ranked vibe coding.",
                "Prompt diff.",
                "Mog your tech lead.",
                "Token maxxing.",
                "Speak softly and carry a large context window.",
                "Based and token-pilled.",
                "10x Engineers HATE this site.",
                "Join the technofeudalist arena.",
                "It's time to ride the K-curve.",
                "What's your token elo?"
            ];
            const el = document.getElementById('heroTyped');
            let phraseIdx = 0;
            const typeSpeed = 50;
            const deleteSpeed = 30;
            const pauseAfterType = 10000;
            const pauseAfterDelete = 800;

            function type(text, i, cb) {
                if (i <= text.length) {
                    el.textContent = text.slice(0, i);
                    el.style.animation = 'blink-caret 0.6s step-end infinite';
                    setTimeout(() => type(text, i + 1, cb), typeSpeed);
                } else {
                    setTimeout(() => { el.style.animation = 'none'; el.style.borderRightColor = 'transparent'; }, 1000);
                    setTimeout(cb, pauseAfterType);
                }
            }

            function erase(cb) {
                el.style.borderRightColor = '';
                const text = el.textContent;
                if (text.length > 0) {
                    el.textContent = text.slice(0, -1);
                    setTimeout(() => erase(cb), deleteSpeed);
                } else {
                    setTimeout(cb, pauseAfterDelete);
                }
            }

            function loop() {
                const phrase = phrases[phraseIdx];
                type(phrase, 0, () => {
                    erase(() => {
                        phraseIdx = (phraseIdx + 1) % phrases.length;
                        loop();
                    });
                });
            }

            loop();
        })();
    </script>

    <script>
        function toggleMenu() {
            document.getElementById('headerNav').classList.toggle('open');
            document.getElementById('hamburgerBtn').classList.toggle('open');
        }
        document.addEventListener('click', function(e) {
            var nav = document.getElementById('headerNav');
            var btn = document.getElementById('hamburgerBtn');
            if (nav && nav.classList.contains('open') &&
                !nav.contains(e.target) && !btn.contains(e.target)) {
                nav.classList.remove('open');
                btn.classList.remove('open');
            }
        });
    </script>
