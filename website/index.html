    <script type="module">
        import { getLeaderboard, getHotUsers, formatNumber, formatCost, formatLeaderboardValueHtml, getCategoryLabel, getCategoryIcon, getCategoryTooltip, CATEGORIES, getTier } from './js/api.js?v=2';
        import { processHourlyData, renderActivityTimeline, localDateISO } from './js/burn-clock.js';

        async function loadDailyTopCards() {
            const container = document.getElementById('dailyTopCards');
            const section = document.getElementById('dailyTopSection');
            try {
                const resp = await fetch('/api/hot/cards?limit=3');
                if (!resp.ok) { section.style.display = 'none'; return; }
                const data = await resp.json();
                if (!data.cards || data.cards.length === 0) { section.style.display = 'none'; return; }

                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                const todayStr = localDateISO(new Date());
                const links = [];

                for (const card of data.cards) {
                    const hourlyData = processHourlyData(card.concurrency, todayStr);
                    const hasActivity = hourlyData.some(d => d.sessions.length > 0);
                    if (!hasActivity) continue;

                    let dayTokens = 0;
                    const localMidnight = new Date(todayStr + 'T00:00:00');
                    for (let h = 0; h < 24; h++) {
                        const t = new Date(localMidnight.getTime() + h * 3600000);
                        const utcDate = t.toISOString().split('T')[0];
                        const utcHour = t.getUTCHours();
                        const key = utcDate + ':' + utcHour;
                        const entry = card.concurrency[key];
                        if (entry && entry.tokens) dayTokens += entry.tokens;
                    }

                    let costText = '$0';
                    if (card.total_tokens > 0 && dayTokens > 0 && card.estimated_spend > 0) {
                        const dayCost = card.estimated_spend * (dayTokens / card.total_tokens);
                        costText = formatCost(dayCost);
                    }

                    const cardData = {
                        username: card.display_name || card.username || 'anonymous',
                        avatarUrl: card.avatar_url || null,
                        dayTokens,
                        costText,
                        localDateStr: todayStr,
                        activeMins: 0,
                    };

                    const link = document.createElement('a');
                    link.href = '/profile.html?hash=' + encodeURIComponent(card.user_hash);
                    link.className = 'daily-top-card';
                    link.style.opacity = '0';

                    const header = document.createElement('div');
                    header.className = 'daily-top-card-header';
                    let headerHtml = '';
                    if (cardData.avatarUrl) {
                        headerHtml += `<img src="${cardData.avatarUrl}" class="daily-top-card-avatar" alt="">`;
                    }
                    headerHtml += `<span class="daily-top-card-name">@${cardData.username}</span>`;
                    headerHtml += `<div class="daily-top-card-stats">`;
                    headerHtml += `<span class="daily-top-card-tokens">${formatNumber(dayTokens)} tokens</span>`;
                    headerHtml += `<span class="daily-top-card-cost">${costText}</span>`;
                    headerHtml += `</div>`;
                    header.innerHTML = headerHtml;
                    link.appendChild(header);

                    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                    svg.style.fontFamily = "'SF Mono', 'Menlo', 'Consolas', 'Liberation Mono', 'Courier New', monospace";
                    renderActivityTimeline(svg, hourlyData, isDark);

                    link.appendChild(svg);
                    links.push(link);
                }

                if (links.length === 0) { section.style.display = 'none'; return; }

                container.querySelectorAll('.daily-top-card-skeleton').forEach(el => el.remove());
                links.forEach((link, i) => {
                    container.appendChild(link);
                    setTimeout(() => {
                        requestAnimationFrame(() => { link.style.opacity = '1'; });
                    }, i * 100);
                });
            } catch (e) {
                section.style.display = 'none';
            }
        }

        function renderCategoryCards(containerId, entries, period) {
            const container = document.getElementById(containerId);
            const cards = [];

            for (let i = 0; i < CATEGORIES.length; i++) {
                const cat = CATEGORIES[i];
                const result = entries[i];
                const label = getCategoryLabel(cat);
                const icon = getCategoryIcon(cat);

                let entriesHtml = '';
                if (result.status === 'fulfilled' && result.value.entries.length > 0) {
                    entriesHtml = result.value.entries.map((e, idx) => {
                        const avatarHtml = e.avatar_url
                            ? `<img src="${e.avatar_url}" alt="" class="top-entry-avatar" loading="lazy">`
                            : `<div class="top-entry-avatar-fallback">${(e.display_name || e.username || '?').charAt(0).toUpperCase()}</div>`;
                        return `
                        <a class="top-entry" href="/profile.html?hash=${e.user_hash}">
                            <span class="top-entry-rank">${idx + 1}</span>
                            ${avatarHtml}
                            <div class="top-entry-info">
                                <div class="top-entry-name">${e.display_name || e.username || 'Anonymous'}</div>
                                <div class="top-entry-value">${formatLeaderboardValueHtml(cat, e.value, e.cost)}</div>
                            </div>
                        </a>`;
                    }).join('');
                } else {
                    entriesHtml = '<div class="top-entry"><div class="top-entry-info" style="color:var(--text-secondary)">No data yet</div></div>';
                }

                cards.push(`
                    <div class="category-card">
                        <div class="category-card-header" data-tooltip="${getCategoryTooltip(cat)}">
                            <h3>${icon} ${label}</h3>
                            <a href="/leaderboard.html?category=${cat}">View all &rarr;</a>
                        </div>
                        ${entriesHtml}
                    </div>
                `);
            }

            container.innerHTML = cards.join('');
        }

        async function loadLanding() {
            const today = new Date().toISOString().split('T')[0];

            const [dailyResults, alltimeResults] = await Promise.all([
                Promise.allSettled(CATEGORIES.map(cat => getLeaderboard(cat, 'daily', 5, 0, today))),
                Promise.allSettled(CATEGORIES.map(cat => getLeaderboard(cat, 'alltime', 5, 0))),
            ]);

            renderCategoryCards('dailyCategories', dailyResults, 'daily');
            renderCategoryCards('alltimeCategories', alltimeResults, 'alltime');
        }

        async function loadHotUsers() {
            try {
                const data = await getHotUsers(10);
                if (!data.users || data.users.length === 0) return;
                const container = document.getElementById('hotUsersSection');
                const cards = data.users.map(u => {
                    const tier = getTier(u.weighted_score);
                    return `
                        <div class="hot-user-card">
                            <div class="hot-user-streak">\u{1f525} ${u.current_streak}d</div>
                            <div class="hot-user-name">
                                <a href="/profile.html?hash=${u.user_hash}">${u.display_name || u.username || 'Anonymous'}</a>
                            </div>
                            <div class="hot-user-meta">
                                <span>${tier.icon}</span>
                                <span>Lv.${u.level}</span>
                            </div>
                        </div>
                    `;
                }).join('');
                container.innerHTML = `
                    <section class="hot-users-section">
                        <h3>\u{1f525} Hot Right Now</h3>
                        <div class="hot-users-scroll">${cards}</div>
                    </section>
                `;
            } catch (e) {
                // Silent fail — hot users is optional
            }
        }

        loadDailyTopCards();
        loadHotUsers();
        loadLanding();

        window.findMe = function() {
            const val = document.getElementById('findInput').value.trim();
            if (!val) return;
            // If it looks like a UUID, go to profile by hash
            if (val.includes('-') && val.length > 20) {
                window.location.href = `/profile.html?hash=${encodeURIComponent(val)}`;
            } else {
                // Search by username — redirect to profile page which will handle lookup
                window.location.href = `/profile.html?username=${encodeURIComponent(val)}`;
            }
        };
    </script>
    <script>
        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            updateToggleLabel();
        }
        function updateToggleLabel() {
            const btn = document.getElementById('themeToggle');
            if (!btn) return;
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            btn.textContent = isDark ? 'light mode' : 'dark mode';
        }
        updateToggleLabel();
    </script>
    <script>
        (function() {
            const phrases = [
                "Find out how much Anthropic money you're burning.",
                "Competitive Claude Code is here.",
                "Competitive vibe coding before GTA6",
                "That's why I quit vibe coding...too many sweats",
                "It's literally ranked vibe coding.",
                "Prompt diff.",
                "Mog your tech lead.",
                "Token maxxing.",
                "Speak softly and carry a large context window.",
                "Based and token-pilled.",
                "Join the technofeudalist arena.",
                "It's time to ride the K-curve.",
                "What's your token elo?"
            ];
            const el = document.getElementById('heroTyped');
            let phraseIdx = 0;
            const typeSpeed = 50;
            const deleteSpeed = 30;
            const pauseAfterType = 10000;
            const pauseAfterDelete = 800;

            function type(text, i, cb) {
                if (i <= text.length) {
                    el.textContent = text.slice(0, i);
                    el.style.animation = 'blink-caret 0.6s step-end infinite';
                    setTimeout(() => type(text, i + 1, cb), typeSpeed);
                } else {
                    setTimeout(() => { el.style.animation = 'none'; el.style.borderRightColor = 'transparent'; }, 1000);
                    setTimeout(cb, pauseAfterType);
                }
            }

            function erase(cb) {
                el.style.borderRightColor = '';
                const text = el.textContent;
                if (text.length > 0) {
                    el.textContent = text.slice(0, -1);
                    setTimeout(() => erase(cb), deleteSpeed);
                } else {
                    setTimeout(cb, pauseAfterDelete);
                }
            }

            function loop() {
                const phrase = phrases[phraseIdx];
                type(phrase, 0, () => {
                    erase(() => {
                        phraseIdx = (phraseIdx + 1) % phrases.length;
                        loop();
                    });
                });
            }

            loop();
        })();
    </script>

    <script>
        function toggleMenu() {
            document.getElementById('headerNav').classList.toggle('open');
            document.getElementById('hamburgerBtn').classList.toggle('open');
        }
        document.addEventListener('click', function(e) {
            var nav = document.getElementById('headerNav');
            var btn = document.getElementById('hamburgerBtn');
            if (nav && nav.classList.contains('open') &&
                !nav.contains(e.target) && !btn.contains(e.target)) {
                nav.classList.remove('open');
                btn.classList.remove('open');
            }
        });
    </script>
    <script>
    (function() {
        var tip = document.createElement('div');
        tip.className = 'cr-tooltip';
        tip.innerHTML = '<div class="cr-tooltip-body"></div>';
        document.body.appendChild(tip);
        var body = tip.querySelector('.cr-tooltip-body');
        var showTimeout, typeTimer, fullText = '', charIdx = 0;

        function stopTyping() {
            clearInterval(typeTimer);
            typeTimer = null;
        }
        function startTyping(text) {
            stopTyping();
            fullText = text;
            charIdx = 0;
            body.innerHTML = '<span class="cr-cursor"></span>';
            typeTimer = setInterval(function() {
                if (charIdx >= fullText.length) { stopTyping(); return; }
                var cursor = body.querySelector('.cr-cursor');
                if (cursor) cursor.remove();
                body.insertAdjacentText('beforeend', fullText[charIdx]);
                body.insertAdjacentHTML('beforeend', '<span class="cr-cursor"></span>');
                charIdx++;
            }, 18);
        }
        document.addEventListener('mouseover', function(e) {
            var el = e.target.closest('[data-tooltip]');
            if (!el) return;
            clearTimeout(showTimeout);
            var text = el.getAttribute('data-tooltip');
            tip.style.left = e.clientX + 14 + 'px';
            tip.style.top = e.clientY + 14 + 'px';
            showTimeout = setTimeout(function() {
                tip.classList.add('visible');
                startTyping(text);
            }, 80);
        });
        document.addEventListener('mousemove', function(e) {
            if (!tip.classList.contains('visible') && !showTimeout) return;
            var x = e.clientX + 14, y = e.clientY + 14;
            if (x + 290 > window.innerWidth) x = e.clientX - 290;
            if (y + 80 > window.innerHeight) y = e.clientY - 80;
            tip.style.left = x + 'px';
            tip.style.top = y + 'px';
        });
        document.addEventListener('mouseout', function(e) {
            var el = e.target.closest('[data-tooltip]');
            if (!el) return;
            clearTimeout(showTimeout);
            showTimeout = null;
            stopTyping();
            tip.classList.remove('visible');
            body.innerHTML = '';
        });
    })();
    </script>
</body>
</html>
