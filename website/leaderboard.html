        <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleMenu()" aria-label="Toggle menu">
            <span></span><span></span><span></span>

    <div class="category-tabs" id="categoryTabs"></div>

    <div class="scope-toggle">
        <button class="scope-btn active" data-scope="individual" onclick="setScope('individual')">Individual</button>
        <button class="scope-btn" data-scope="team" onclick="setScope('team')">Team</button>
    </div>

    <div class="leaderboard-container">
        <div id="leaderboardContent"><div class="loading">Loading</div></div>
    </div>

    <div class="pagination" id="pagination"></div>

    <script type="module">
        import { getLeaderboard, formatNumber, formatCost, getCategoryLabel, getCategoryIcon, CATEGORIES, getTier } from './js/api.js';

        const params = new URLSearchParams(window.location.search);
        let currentCategory = params.get('category') || 'tokens';
        let currentScope = 'individual';
        let currentOffset = 0;
        const PAGE_SIZE = 50;

        function renderTabs() {
            const container = document.getElementById('categoryTabs');
            container.innerHTML = CATEGORIES.map(cat => `
                <button class="category-tab ${cat === currentCategory ? 'active' : ''}"
                        onclick="window.setCategory('${cat}')">
                    ${getCategoryIcon(cat)} ${getCategoryLabel(cat)}
                </button>
            `).join('');
        }

        async function loadLeaderboard() {
            const content = document.getElementById('leaderboardContent');
            content.innerHTML = '<div class="loading">Loading</div>';

            try {
                const data = await getLeaderboard(currentCategory, currentScope, PAGE_SIZE, currentOffset);
                if (data.entries.length === 0) {
                    content.innerHTML = '<div class="loading" style="color:var(--text-secondary)">No entries yet</div>';
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }

                const isTeam = currentScope === 'team';
                const rows = data.entries.map(e => {
                    const rankClass = e.rank <= 3 ? `rank-${e.rank}` : '';
                    const tierIcon = (!isTeam && e.weighted_score != null) ? `<span class="leaderboard-tier">${getTier(e.weighted_score).icon}</span>` : '';
                    const name = isTeam
                        ? `<a href="/team.html?hash=${e.team_hash}">${e.team_name}</a>`
                        : `<a href="/profile.html?hash=${e.user_hash}">${e.username || 'Anonymous'}</a>${tierIcon}`;
                    const extra = isTeam ? `<td>${e.member_count}</td>` : '';
                    return `<tr>
                        <td class="rank-cell ${rankClass}">${e.rank}</td>
                        <td class="username-cell">${name}</td>
                        <td class="value-cell">${currentCategory === 'cost' ? formatCost(e.value) : formatNumber(e.value)}</td>
                        ${extra}
                    </tr>`;
                }).join('');

                const extraHeader = isTeam ? '<th>Members</th>' : '';
                content.innerHTML = `
                    <table class="leaderboard-table">
                        <thead><tr>
                            <th>Rank</th>
                            <th>${isTeam ? 'Team' : 'User'}</th>
                            <th style="text-align:right">${getCategoryLabel(currentCategory)}</th>
                            ${extraHeader}
                        </tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                `;

                // Pagination
                const totalPages = Math.ceil(data.total_count / PAGE_SIZE);
                const currentPage = Math.floor(currentOffset / PAGE_SIZE) + 1;
                document.getElementById('pagination').innerHTML = `
                    <button ${currentPage <= 1 ? 'disabled' : ''} onclick="window.prevPage()">Previous</button>
                    <span class="page-info">Page ${currentPage} of ${totalPages} (${data.total_count} total)</span>
                    <button ${currentPage >= totalPages ? 'disabled' : ''} onclick="window.nextPage()">Next</button>
                `;
            } catch (err) {
                content.innerHTML = `<div class="loading" style="color:var(--red)">Error: ${err.message}</div>`;
            }
        }

        window.setCategory = function(cat) {
            currentCategory = cat;
            currentOffset = 0;
            history.replaceState(null, '', `?category=${cat}`);
            renderTabs();
            loadLeaderboard();
        };

        window.setScope = function(scope) {
            currentScope = scope;
            currentOffset = 0;
            document.querySelectorAll('.scope-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.scope === scope);
            });
            loadLeaderboard();
        };

        window.prevPage = function() {
            currentOffset = Math.max(0, currentOffset - PAGE_SIZE);
            loadLeaderboard();
        };

        window.nextPage = function() {
            currentOffset += PAGE_SIZE;
            loadLeaderboard();
        };

        renderTabs();
        loadLeaderboard();
    </script>
    <script>
        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            updateToggleLabel();
        }
        function updateToggleLabel() {
            const btn = document.getElementById('themeToggle');
            if (!btn) return;
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            btn.textContent = isDark ? 'light mode' : 'dark mode';
        }
        updateToggleLabel();
    </script>
    <script type="module" src="js/auth.js"></script>
    <script>
        function toggleMenu() {
            document.getElementById('headerNav').classList.toggle('open');
            document.getElementById('hamburgerBtn').classList.toggle('open');
        }
        document.addEventListener('click', function(e) {
            var nav = document.getElementById('headerNav');
            var btn = document.getElementById('hamburgerBtn');
            if (nav && nav.classList.contains('open') &&
                !nav.contains(e.target) && !btn.contains(e.target)) {
                nav.classList.remove('open');
                btn.classList.remove('open');
            }
        });
    </script>
