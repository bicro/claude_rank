<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team - ClaudeRank</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <header class="site-header">
        <h1><a href="/" style="color:inherit;text-decoration:none"><img src="images/logo.png" alt="ClaudeRank logo" class="site-logo">ClaudeRank</a></h1>
        <nav class="header-nav" id="headerNav">
            <a href="https://discord.gg/mCkyz9UCCd" class="discord-link" target="_blank"><svg width="16" height="12" viewBox="0 0 71 55" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M60.1 4.9A58.5 58.5 0 0045.4.2a.2.2 0 00-.2.1 40.8 40.8 0 00-1.8 3.7 54 54 0 00-16.2 0A37.4 37.4 0 0025.4.3a.2.2 0 00-.2-.1A58.4 58.4 0 0010.5 4.9a.2.2 0 00-.1.1C1.5 18.7-.9 32.2.3 45.5v.1a58.8 58.8 0 0017.7 9a.2.2 0 00.3-.1 42 42 0 003.6-5.9.2.2 0 00-.1-.3 38.8 38.8 0 01-5.5-2.6.2.2 0 01 0-.4l1.1-.9a.2.2 0 01.2 0 42 42 0 0035.6 0 .2.2 0 01.2 0l1.1.9a.2.2 0 010 .4 36.4 36.4 0 01-5.5 2.6.2.2 0 00-.1.3 47.2 47.2 0 003.6 5.9.2.2 0 00.3.1 58.6 58.6 0 0017.7-9v-.1c1.4-15.2-2.4-28.4-10-40.1a.2.2 0 00-.1-.1zM23.7 37.3c-3.5 0-6.3-3.2-6.3-7s2.8-7 6.3-7 6.4 3.2 6.3 7-2.8 7-6.3 7zm23.3 0c-3.5 0-6.3-3.2-6.3-7s2.8-7 6.3-7 6.4 3.2 6.3 7-2.8 7-6.3 7z" fill="currentColor"/></svg>Discord</a>
            <button id="themeToggle" onclick="toggleTheme()">dark mode</button>
        </nav>
        <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleMenu()" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
    </header>

    <div id="teamContent"><div class="loading">Loading team</div></div>

    <script type="module">
        import { getTeam, getTeamHistory, formatNumber } from './js/api.js';

        const params = new URLSearchParams(window.location.search);
        const teamHash = params.get('hash');

        if (!teamHash) {
            document.getElementById('teamContent').innerHTML =
                '<div class="loading" style="color:var(--red)">No team hash provided</div>';
        } else {
            loadTeam(teamHash);
        }

        async function loadTeam(hash) {
            const container = document.getElementById('teamContent');
            try {
                const [team, history] = await Promise.all([
                    getTeam(hash),
                    getTeamHistory(hash, 30),
                ]);

                const m = team.metrics;

                container.innerHTML = `
                    <div class="team-header">
                        <h2>${team.team_name}</h2>
                        <div class="team-code">Invite code: ${team.team_hash}</div>
                        <div class="meta" style="color:var(--text-secondary);margin-top:4px">
                            ${team.member_count} member${team.member_count !== 1 ? 's' : ''}
                            &middot; Created ${new Date(team.created_at).toLocaleDateString()}
                        </div>
                    </div>

                    <div class="profile-stats">
                        <div class="stat-card">
                            <div class="label">Total Tokens</div>
                            <div class="value">${formatNumber(m.total_tokens)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">Messages</div>
                            <div class="value">${formatNumber(m.total_messages)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">Sessions</div>
                            <div class="value">${formatNumber(m.total_sessions)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">Tool Calls</div>
                            <div class="value">${formatNumber(m.total_tool_calls)}</div>
                        </div>
                    </div>

                    <div class="team-members">
                        <h3>Members</h3>
                        <table class="leaderboard-table">
                            <thead><tr><th>User</th></tr></thead>
                            <tbody>
                                ${team.members.map(m => `
                                    <tr>
                                        <td class="username-cell">
                                            <a href="/profile.html?hash=${m.user_hash}">${m.username || 'Anonymous'}</a>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>

                    ${history.length > 0 ? `
                    <div class="chart-container" style="max-width:900px;margin:0 auto 24px;">
                        <h3>Team Token Growth</h3>
                        <canvas id="teamChart"></canvas>
                    </div>
                    ` : ''}
                `;

                if (history.length > 0) {
                    const sorted = [...history].sort((a, b) => a.date.localeCompare(b.date));
                    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                    const lineColor = isDark ? '#e0e0e0' : '#333';
                    const fillColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
                    const gridColor = isDark ? '#1a1a1a' : '#e8e8e8';
                    const tickColor = isDark ? '#888' : '#888';
                    new Chart(document.getElementById('teamChart'), {
                        type: 'line',
                        data: {
                            labels: sorted.map(h => h.date),
                            datasets: [{
                                data: sorted.map(h => h.tokens),
                                borderColor: lineColor,
                                backgroundColor: fillColor,
                                fill: true, tension: 0.3, pointRadius: 2,
                            }],
                        },
                        options: {
                            responsive: true,
                            plugins: { legend: { display: false } },
                            scales: {
                                x: { ticks: { color: tickColor }, grid: { color: gridColor } },
                                y: { ticks: { color: tickColor }, grid: { color: gridColor } },
                            },
                        },
                    });
                }

                document.title = `${team.team_name} - ClaudeRank`;
            } catch (err) {
                container.innerHTML = `<div class="loading" style="color:var(--red)">Error: ${err.message}</div>`;
            }
        }
    </script>
    <script>
        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            updateToggleLabel();
        }
        function updateToggleLabel() {
            const btn = document.getElementById('themeToggle');
            if (!btn) return;
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            btn.textContent = isDark ? 'light mode' : 'dark mode';
        }
        updateToggleLabel();
    </script>
    <script>
        function toggleMenu() {
            document.getElementById('headerNav').classList.toggle('open');
            document.getElementById('hamburgerBtn').classList.toggle('open');
        }
        document.addEventListener('click', function(e) {
            var nav = document.getElementById('headerNav');
            var btn = document.getElementById('hamburgerBtn');
            if (nav && nav.classList.contains('open') &&
                !nav.contains(e.target) && !btn.contains(e.target)) {
                nav.classList.remove('open');
                btn.classList.remove('open');
            }
        });
    </script>
</body>
</html>
