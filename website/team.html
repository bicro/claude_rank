<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team - ClaudeRank</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

</head>
<body>
    <header class="site-header">
        <h1><a href="/" style="color:inherit;text-decoration:none"><img src="images/logo.png" alt="ClaudeRank logo" class="site-logo">CLAUDERANK</a></h1>
        <nav class="header-nav" id="headerNav">
            <a href="https://discord.gg/mCkyz9UCCd" class="discord-link" target="_blank"><svg width="16" height="12" viewBox="0 0 71 55" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M60.1 4.9A58.5 58.5 0 0045.4.2a.2.2 0 00-.2.1 40.8 40.8 0 00-1.8 3.7 54 54 0 00-16.2 0A37.4 37.4 0 0025.4.3a.2.2 0 00-.2-.1A58.4 58.4 0 0010.5 4.9a.2.2 0 00-.1.1C1.5 18.7-.9 32.2.3 45.5v.1a58.8 58.8 0 0017.7 9a.2.2 0 00.3-.1 42 42 0 003.6-5.9.2.2 0 00-.1-.3 38.8 38.8 0 01-5.5-2.6.2.2 0 01 0-.4l1.1-.9a.2.2 0 01.2 0 42 42 0 0035.6 0 .2.2 0 01.2 0l1.1.9a.2.2 0 010 .4 36.4 36.4 0 01-5.5 2.6.2.2 0 00-.1.3 47.2 47.2 0 003.6 5.9.2.2 0 00.3.1 58.6 58.6 0 0017.7-9v-.1c1.4-15.2-2.4-28.4-10-40.1a.2.2 0 00-.1-.1zM23.7 37.3c-3.5 0-6.3-3.2-6.3-7s2.8-7 6.3-7 6.4 3.2 6.3 7-2.8 7-6.3 7zm23.3 0c-3.5 0-6.3-3.2-6.3-7s2.8-7 6.3-7 6.4 3.2 6.3 7-2.8 7-6.3 7z" fill="currentColor"/></svg>Discord</a>
            <a href="https://github.com/bicro/claude_rank" class="discord-link" target="_blank"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>GitHub</a>
            <button id="themeToggle" onclick="toggleTheme()">dark mode</button>
        </nav>
        <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleMenu()" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
    </header>

    <div id="teamContent"><div class="loading">Loading team</div></div>

    <style>
        .team-period-bar { display: flex; flex-direction: column; align-items: center; gap: 10px; max-width: 900px; margin: 0 auto 20px; }
        .period-toggle { display: flex; background: var(--card-bg, #f5f0eb); border: 1px solid var(--border, #e0ddd9); border-radius: 10px; padding: 3px; gap: 0; }
        .period-btn { font-family: inherit; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; padding: 6px 14px; border: none; border-radius: 8px; cursor: pointer; background: transparent; color: var(--text-secondary, #8a8480); transition: background 0.15s, color 0.15s; }
        .period-btn.active { background: var(--text-primary, #1a1a1a); color: var(--card-bg, #fff); }
        .date-nav { display: flex; align-items: center; gap: 10px; }
        .date-nav button { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; cursor: pointer; color: var(--text-primary); font-size: 13px; }
        .date-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
        .date-nav-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); min-width: 140px; text-align: center; }
        .team-burn-section { margin: 0 auto 24px; }
        #teamBurnCards { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        #teamBurnCards.scrollable { flex-wrap: nowrap; justify-content: flex-start; overflow-x: auto; padding-bottom: 12px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        #teamBurnCards.scrollable::-webkit-scrollbar { height: 6px; }
        #teamBurnCards.scrollable::-webkit-scrollbar-track { background: transparent; }
        #teamBurnCards.scrollable::-webkit-scrollbar-thumb { background: var(--border, #ccc); border-radius: 3px; }
        #teamBurnCards > div { flex: 0 0 336px; }
        #teamBurnCards.scrollable > div { scroll-snap-align: start; }
        #teamBurnCards svg { width: 100%; height: auto; border-radius: 16px; }
        .team-title-row { display: flex; align-items: center; gap: 12px; }
        .team-title-row h2 { margin: 0; }
        .invite-code-btn {
            display: inline-flex; align-items: center; gap: 6px;
            font-family: inherit; font-size: 13px; font-weight: 600;
            padding: 6px 14px; border-radius: 8px; cursor: pointer;
            background: var(--card-bg, #f5f0eb); border: 1px solid var(--border, #e0ddd9);
            color: var(--text-secondary, #8a8480); transition: border-color 0.15s, color 0.15s;
        }
        .invite-code-btn:hover { border-color: var(--text-primary); color: var(--text-primary); }
        .invite-code-btn.copied { color: #4ade80; border-color: #4ade80; }
        .team-stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        @media (max-width: 640px) {
            .team-period-bar { flex-direction: column; gap: 10px; }
            #teamBurnCards > div { flex: 0 0 85vw; }
            #teamBurnCards.scrollable { padding: 0 8px 12px; }
            .team-stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
    <script type="module">
        import { getTeam, getTeamHistory, getTeamBurn, formatNumber, formatCost } from './js/api.js';
        import { processHourlyData, renderShareableCardV5, renderShareableCardV6, localDateISO } from './js/burn-clock.js';

        const params = new URLSearchParams(window.location.search);
        const teamHash = params.get('hash');

        if (!teamHash) {
            document.getElementById('teamContent').innerHTML =
                '<div class="loading" style="color:var(--red)">No team hash provided</div>';
        } else {
            loadTeam(teamHash);
        }

        async function loadTeam(hash) {
            const container = document.getElementById('teamContent');
            try {
                const [team, history] = await Promise.all([
                    getTeam(hash),
                    getTeamHistory(hash, 30),
                ]);

                const m = team.metrics;

                container.innerHTML = `
                    <div class="team-header">
                        <div class="team-title-row">
                            <h2>${team.team_name}</h2>
                            <button class="invite-code-btn" id="inviteCodeBtn" title="Click to copy invite code">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                                Invite Code
                            </button>
                        </div>
                        <div class="meta" style="color:var(--text-secondary);margin-top:4px">
                            ${team.member_count} member${team.member_count !== 1 ? 's' : ''}
                            &middot; Created ${new Date(team.created_at).toLocaleDateString()}
                        </div>
                    </div>

                    <div class="team-period-bar">
                        <div class="date-nav">
                            <button id="teamDayPrev">&#9664;</button>
                            <span class="date-nav-label" id="teamDayLabel">Today</span>
                            <button id="teamDayNext" disabled>&#9654;</button>
                        </div>
                        <div class="period-toggle" id="periodToggle">
                            <button class="period-btn" data-period="lifetime">LIFETIME</button>
                            <button class="period-btn" data-period="1m">1M</button>
                            <button class="period-btn" data-period="1w">1W</button>
                            <button class="period-btn active" data-period="1d">1D</button>
                        </div>
                    </div>

                    <div class="team-members" style="max-width:900px;margin:0 auto 24px;">
                        <table class="leaderboard-table">
                            <thead><tr><th>#</th><th>User</th><th style="text-align:right">Tokens</th><th style="text-align:right">Cost</th></tr></thead>
                            <tbody id="rankingBody"></tbody>
                        </table>
                    </div>

                    <div class="team-burn-section">
                        <div id="teamBurnCards"></div>
                    </div>

                    <div style="max-width:900px;margin:0 auto 24px;">
                        <div class="team-stats-grid">
                            <div class="stat-card"><div class="label">Total Tokens</div><div class="value">${formatNumber(m.total_tokens)}</div></div>
                            <div class="stat-card"><div class="label">Messages</div><div class="value">${formatNumber(m.total_messages)}</div></div>
                            <div class="stat-card"><div class="label">Sessions</div><div class="value">${formatNumber(m.total_sessions)}</div></div>
                            <div class="stat-card"><div class="label">Tool Calls</div><div class="value">${formatNumber(m.total_tool_calls)}</div></div>
                        </div>
                    </div>

                    ${history.length > 0 ? `
                    <div class="chart-container" style="max-width:900px;margin:0 auto 24px;">
                        <h3>Team Token Growth</h3>
                        <canvas id="teamChart"></canvas>
                    </div>
                    ` : ''}
                `;

                if (history.length > 0) {
                    const sorted = [...history].sort((a, b) => a.date.localeCompare(b.date));
                    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                    const lineColor = isDark ? '#e0e0e0' : '#333';
                    const fillColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
                    const gridColor = isDark ? '#2a2a2a' : '#e8e8e8';
                    const tickColor = isDark ? '#888' : '#888';
                    new Chart(document.getElementById('teamChart'), {
                        type: 'line',
                        data: {
                            labels: sorted.map(h => h.date),
                            datasets: [{
                                data: sorted.map(h => h.tokens),
                                borderColor: lineColor,
                                backgroundColor: fillColor,
                                fill: true, tension: 0.3, pointRadius: 2,
                            }],
                        },
                        options: {
                            responsive: true,
                            plugins: { legend: { display: false } },
                            scales: {
                                x: { ticks: { color: tickColor }, grid: { color: gridColor } },
                                y: { ticks: { color: tickColor }, grid: { color: gridColor } },
                            },
                        },
                    });
                }

                // ── Invite code button ──
                const inviteBtn = document.getElementById('inviteCodeBtn');
                if (inviteBtn) {
                    inviteBtn.addEventListener('click', async () => {
                        try {
                            await navigator.clipboard.writeText(team.team_hash);
                            inviteBtn.textContent = 'Copied!';
                            inviteBtn.classList.add('copied');
                            setTimeout(() => {
                                inviteBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Invite Code';
                                inviteBtn.classList.remove('copied');
                            }, 1500);
                        } catch {}
                    });
                }

                // ── Period + date navigation ──
                const PERIODS = { '1d': 1, '1w': 7, '1m': 30, 'lifetime': 0 };
                const PERIOD_STEPS = { '1d': 1, '1w': 7, '1m': 30, 'lifetime': 0 };
                let currentPeriod = '1d';
                let navOffset = 0; // in days from today

                const teamDayPrev = document.getElementById('teamDayPrev');
                const teamDayNext = document.getElementById('teamDayNext');
                const teamDayLabel = document.getElementById('teamDayLabel');
                const periodBtns = document.querySelectorAll('.period-btn');
                const teamMembers = team.members;

                function getDateLabel() {
                    if (currentPeriod === 'lifetime') return 'All Time';
                    const end = new Date(); end.setDate(end.getDate() + navOffset);
                    const endStr = localDateISO(end);
                    if (currentPeriod === '1d') {
                        return navOffset === 0 ? 'Today' : formatDatePretty(endStr);
                    }
                    const days = PERIODS[currentPeriod];
                    const start = new Date(end); start.setDate(start.getDate() - days + 1);
                    return formatDatePretty(localDateISO(start)) + ' – ' + formatDatePretty(endStr);
                }

                function formatDatePretty(dateStr) {
                    const d = new Date(dateStr + 'T12:00:00');
                    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                    return months[d.getMonth()] + ' ' + d.getDate();
                }

                function updateNav() {
                    teamDayLabel.textContent = getDateLabel();
                    const step = PERIOD_STEPS[currentPeriod];
                    teamDayNext.disabled = navOffset >= 0 || currentPeriod === 'lifetime';
                    teamDayPrev.disabled = navOffset <= -365 || currentPeriod === 'lifetime';
                }

                periodBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        periodBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        currentPeriod = btn.dataset.period;
                        navOffset = 0;
                        loadTeamData();
                    });
                });

                teamDayPrev.onclick = () => { navOffset -= PERIOD_STEPS[currentPeriod]; loadTeamData(); };
                teamDayNext.onclick = () => { navOffset += PERIOD_STEPS[currentPeriod]; if (navOffset > 0) navOffset = 0; loadTeamData(); };

                function updateBurnScrollMode() {
                    const c = document.getElementById('teamBurnCards');
                    if (!c) return;
                    c.classList.toggle('scrollable', c.children.length > 3);
                }

                async function fetchAvatarDataUrl(url) {
                    if (!url) return null;
                    try {
                        const res = await fetch(url);
                        if (!res.ok) return null;
                        const blob = await res.blob();
                        return await new Promise((resolve, reject) => {
                            const reader = new FileReader();
                            reader.onload = () => resolve(reader.result);
                            reader.onerror = reject;
                            reader.readAsDataURL(blob);
                        });
                    } catch { return null; }
                }

                async function loadTeamData() {
                    updateNav();
                    const cardsContainer = document.getElementById('teamBurnCards');
                    const rankingBody = document.getElementById('rankingBody');

                    if (currentPeriod === 'lifetime') {
                        // Fetch each member's total tokens from profile
                        rankingBody.innerHTML = '<tr><td colspan="4" class="loading">Loading...</td></tr>';
                        cardsContainer.innerHTML = '<div class="loading">Loading burn cards...</div>';
                        try {
                            const profiles = await Promise.all(teamMembers.map(async m => {
                                const p = await fetch('/api/users/' + m.user_hash).then(r => r.json());
                                return { ...m, display_name: p.display_name || m.display_name, total_tokens: p.metrics?.total_tokens || 0, estimated_spend: p.metrics?.estimated_spend || 0 };
                            }));
                            profiles.sort((a, b) => b.total_tokens - a.total_tokens);
                            renderRankingTable(rankingBody, profiles, 'total_tokens');
                        } catch { rankingBody.innerHTML = '<tr><td colspan="4" style="color:var(--red)">Error</td></tr>'; }
                        // Still show today's burn cards
                        try {
                            const todayStr = localDateISO(new Date());
                            const burn = await getTeamBurn(hash, todayStr, 1);
                            const sorted = [...burn.members].sort((a, b) => (b.daily_tokens || 0) - (a.daily_tokens || 0));
                            if (sorted.length > 0) {
                                const avatars = await Promise.all(sorted.map(m => fetchAvatarDataUrl(m.avatar_url)));
                                cardsContainer.innerHTML = '';
                                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                                sorted.forEach((member, i) => {
                                    const wrapper = document.createElement('div');
                                    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                                    wrapper.appendChild(svg);
                                    cardsContainer.appendChild(wrapper);
                                    const hourlyData = processHourlyData(member.concurrency, todayStr);
                                    const costText = member.estimated_spend ? formatCost(member.estimated_spend) : '$0';
                                    const cardData = { username: member.display_name || member.username || 'anonymous', dayTokens: member.daily_tokens || 0, costText, localDateStr: todayStr, avatarDataUrl: avatars[i] };
                                    isDark ? renderShareableCardV6(svg, hourlyData, [], cardData) : renderShareableCardV5(svg, hourlyData, [], cardData);
                                });
                                updateBurnScrollMode();
                            } else {
                                cardsContainer.innerHTML = '<div style="color:var(--text-secondary);text-align:center;padding:24px;">No activity today</div>';
                            }
                        } catch { cardsContainer.innerHTML = ''; }
                        return;
                    }

                    const endDate = new Date(); endDate.setDate(endDate.getDate() + navOffset);
                    const dateStr = localDateISO(endDate);
                    const days = PERIODS[currentPeriod];

                    rankingBody.innerHTML = '<tr><td colspan="4" class="loading">Loading...</td></tr>';
                    cardsContainer.innerHTML = '<div class="loading">Loading burn cards...</div>';

                    try {
                        const burn = await getTeamBurn(hash, dateStr, days);
                        const sorted = [...burn.members].sort((a, b) => (b.daily_tokens || 0) - (a.daily_tokens || 0));

                        // Ranking table
                        renderRankingTable(rankingBody, sorted, 'daily_tokens');

                        // Burn cards (always show the end date's hourly data)
                        if (sorted.length === 0) {
                            cardsContainer.innerHTML = '<div style="color:var(--text-secondary);text-align:center;padding:24px;">No activity</div>';
                            return;
                        }

                        const avatars = await Promise.all(sorted.map(m => fetchAvatarDataUrl(m.avatar_url)));
                        cardsContainer.innerHTML = '';
                        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

                        sorted.forEach((member, i) => {
                            const wrapper = document.createElement('div');
                            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                            wrapper.appendChild(svg);
                            cardsContainer.appendChild(wrapper);

                            const hourlyData = processHourlyData(member.concurrency, dateStr);
                            const costText = member.estimated_spend ? formatCost(member.estimated_spend) : '$0';

                            const cardData = {
                                username: member.display_name || member.username || 'anonymous',
                                dayTokens: member.daily_tokens || 0,
                                costText,
                                localDateStr: dateStr,
                                avatarDataUrl: avatars[i],
                            };

                            if (isDark) {
                                renderShareableCardV6(svg, hourlyData, [], cardData);
                            } else {
                                renderShareableCardV5(svg, hourlyData, [], cardData);
                            }
                        });
                        updateBurnScrollMode();
                    } catch (err) {
                        cardsContainer.innerHTML = `<div style="color:var(--red);text-align:center;padding:24px;">Error: ${err.message}</div>`;
                    }
                }

                function renderRankingTable(tbody, members, tokenKey) {
                    tbody.innerHTML = members.map((m, i) => `
                        <tr>
                            <td style="width:40px;text-align:center;color:var(--text-secondary)">${i + 1}</td>
                            <td class="username-cell">
                                <a href="/profile.html?hash=${m.user_hash}">${m.display_name || m.username || 'Anonymous'}</a>
                            </td>
                            <td style="text-align:right">${formatNumber(m[tokenKey] || 0)}</td>
                            <td style="text-align:right">${m.estimated_spend ? formatCost(m.estimated_spend) : '$0'}</td>
                        </tr>
                    `).join('');
                }

                loadTeamData();

                document.title = `${team.team_name} - ClaudeRank`;
            } catch (err) {
                container.innerHTML = `<div class="loading" style="color:var(--red)">Error: ${err.message}</div>`;
            }
        }
    </script>
    <script>
        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            updateToggleLabel();
        }
        function updateToggleLabel() {
            const btn = document.getElementById('themeToggle');
            if (!btn) return;
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            btn.textContent = isDark ? 'light mode' : 'dark mode';
        }
        updateToggleLabel();
    </script>

    <script>
        function toggleMenu() {
            document.getElementById('headerNav').classList.toggle('open');
            document.getElementById('hamburgerBtn').classList.toggle('open');
        }
        document.addEventListener('click', function(e) {
            var nav = document.getElementById('headerNav');
            var btn = document.getElementById('hamburgerBtn');
            if (nav && nav.classList.contains('open') &&
                !nav.contains(e.target) && !btn.contains(e.target)) {
                nav.classList.remove('open');
                btn.classList.remove('open');
            }
        });
    </script>
</body>
</html>
