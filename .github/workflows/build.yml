name: Build Claude Rank

on:
  push:
    branches: ["main"]
  workflow_dispatch: # Allow manual trigger

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      should_release: ${{ steps.check_tag.outputs.should_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tauri.conf.json
        id: get_version
        run: |
          VERSION=$(jq -r .version desktop/src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.get_version.outputs.version }} already exists, skipping release"
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.get_version.outputs.version }} does not exist, will create release"
          fi

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Add Intel target for universal build
        run: rustup target add x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "desktop/src-tauri -> target"

      - name: Install dependencies
        run: bun install
        working-directory: desktop

      - name: Import Code Signing Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          rm $RUNNER_TEMP/certificate.p12

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Set as default and add to search list
          security default-keychain -s $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH login.keychain

          # Debug: show available identities
          echo "Available signing identities:"
          security find-identity -v -p codesigning

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build Tauri app (Universal macOS)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run build:mac
        working-directory: desktop

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: clauderank-macos-dmg
          path: desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload macOS updater artifact
        uses: actions/upload-artifact@v4
        with:
          name: clauderank-macos-updater
          path: |
            desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.tar.gz
            desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.tar.gz.sig
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "desktop/src-tauri -> target"

      - name: Install dependencies
        run: bun install
        working-directory: desktop

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run build:windows
        working-directory: desktop

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: clauderank-windows-msi
          path: desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload Windows updater artifact
        uses: actions/upload-artifact@v4
        with:
          name: clauderank-windows-updater
          path: |
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi.zip
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi.zip.sig
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip.sig
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "desktop/src-tauri -> target"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libxdo-dev libssl-dev

      - name: Install dependencies
        run: bun install
        working-directory: desktop

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run build:linux
        working-directory: desktop

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: clauderank-linux-appimage
          path: desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload Linux AppImage sig
        uses: actions/upload-artifact@v4
        with:
          name: clauderank-linux-updater
          path: desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig
          if-no-files-found: warn

      - name: Upload Linux deb
        uses: actions/upload-artifact@v4
        with:
          name: clauderank-linux-deb
          path: desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          if-no-files-found: warn

  release:
    needs: [check-version, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && needs.check-version.outputs.should_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: clauderank-macos-dmg
          path: ./artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: clauderank-windows-msi
          path: ./artifacts

      - name: Download Linux AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: clauderank-linux-appimage
          path: ./artifacts

      - name: Download Linux deb artifact
        uses: actions/download-artifact@v4
        with:
          name: clauderank-linux-deb
          path: ./artifacts

      - name: Download macOS updater artifact
        uses: actions/download-artifact@v4
        with:
          name: clauderank-macos-updater
          path: ./updater
        continue-on-error: true

      - name: Download Windows updater artifact
        uses: actions/download-artifact@v4
        with:
          name: clauderank-windows-updater
          path: ./updater
        continue-on-error: true

      - name: Download Linux updater artifact
        uses: actions/download-artifact@v4
        with:
          name: clauderank-linux-updater
          path: ./updater
        continue-on-error: true

      - name: Rename artifacts for release
        run: |
          mv ./artifacts/*.dmg ./artifacts/ClaudeRank-macOS.dmg
          mv ./artifacts/*.msi ./artifacts/ClaudeRank-Windows.msi
          mv ./artifacts/*.AppImage ./artifacts/ClaudeRank-Linux.AppImage
          mv ./artifacts/*.deb ./artifacts/ClaudeRank-Linux.deb

      - name: Generate latest.json for updater
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          REPO: bicro/claude_rank
        run: |
          BASE_URL="https://github.com/${REPO}/releases/download/v${VERSION}"

          # Read signatures (empty string if not found)
          MAC_SIG=""
          WIN_MSI_SIG=""
          WIN_NSIS_SIG=""
          LINUX_SIG=""

          for f in ./updater/*.tar.gz.sig; do [ -f "$f" ] && MAC_SIG=$(cat "$f") && break; done
          for f in ./updater/*.msi.zip.sig; do [ -f "$f" ] && WIN_MSI_SIG=$(cat "$f") && break; done
          for f in ./updater/*.nsis.zip.sig; do [ -f "$f" ] && WIN_NSIS_SIG=$(cat "$f") && break; done
          for f in ./updater/*.AppImage.sig; do [ -f "$f" ] && LINUX_SIG=$(cat "$f") && break; done

          # Find actual updater filenames
          MAC_TAR=$(ls ./updater/*.tar.gz 2>/dev/null | head -1 | xargs -I{} basename {} || echo "")
          WIN_MSI_ZIP=$(ls ./updater/*.msi.zip 2>/dev/null | head -1 | xargs -I{} basename {} || echo "")
          WIN_NSIS_ZIP=$(ls ./updater/*.nsis.zip 2>/dev/null | head -1 | xargs -I{} basename {} || echo "")
          LINUX_APPIMAGE=$(ls ./updater/*.AppImage 2>/dev/null | head -1 | xargs -I{} basename {} || echo "")

          # Build latest.json
          python3 -c "
          import json, os
          version = os.environ['VERSION']
          base = os.environ['BASE_URL']
          platforms = {}

          mac_sig = '''${MAC_SIG}'''
          mac_tar = '${MAC_TAR}'
          if mac_sig and mac_tar:
              platforms['darwin-universal'] = {'signature': mac_sig, 'url': f'{base}/{mac_tar}'}
              platforms['darwin-aarch64'] = platforms['darwin-universal']
              platforms['darwin-x86_64'] = platforms['darwin-universal']

          win_nsis_sig = '''${WIN_NSIS_SIG}'''
          win_nsis_zip = '${WIN_NSIS_ZIP}'
          win_msi_sig = '''${WIN_MSI_SIG}'''
          win_msi_zip = '${WIN_MSI_ZIP}'
          if win_nsis_sig and win_nsis_zip:
              platforms['windows-x86_64'] = {'signature': win_nsis_sig, 'url': f'{base}/{win_nsis_zip}'}
          elif win_msi_sig and win_msi_zip:
              platforms['windows-x86_64'] = {'signature': win_msi_sig, 'url': f'{base}/{win_msi_zip}'}

          linux_sig = '''${LINUX_SIG}'''
          linux_ai = '${LINUX_APPIMAGE}'
          if linux_sig and linux_ai:
              platforms['linux-x86_64'] = {'signature': linux_sig, 'url': f'{base}/{linux_ai}'}

          manifest = {
              'version': version,
              'notes': f'ClaudeRank v{version}',
              'pub_date': '$(date -u +%Y-%m-%dT%H:%M:%SZ)',
              'platforms': platforms,
          }
          with open('./artifacts/latest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          print(json.dumps(manifest, indent=2))
          "

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: |
            ClaudeRank v${{ needs.check-version.outputs.version }}
            Commit: ${{ github.sha }}
          files: |
            ./artifacts/ClaudeRank-macOS.dmg
            ./artifacts/ClaudeRank-Windows.msi
            ./artifacts/ClaudeRank-Linux.AppImage
            ./artifacts/ClaudeRank-Linux.deb
            ./artifacts/latest.json
            ./updater/*
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
