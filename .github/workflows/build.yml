name: Build Claude Rank

on:
  push:
    branches: ["main"]
  workflow_dispatch: # Allow manual trigger

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Add Intel target for universal build
        run: rustup target add x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "desktop/src-tauri -> target"

      - name: Install dependencies
        run: bun install
        working-directory: desktop

      - name: Import Code Signing Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          rm $RUNNER_TEMP/certificate.p12

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Set as default and add to search list
          security default-keychain -s $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH login.keychain

          # Debug: show available identities
          echo "Available signing identities:"
          security find-identity -v -p codesigning

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build Tauri app (Universal macOS)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: bun run build:mac
        working-directory: desktop

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: clauderank-macos-dmg
          path: desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "desktop/src-tauri -> target"

      - name: Install dependencies
        run: bun install
        working-directory: desktop

      - name: Build Tauri app
        run: bun run build:windows
        working-directory: desktop

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: clauderank-windows-msi
          path: desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "desktop/src-tauri -> target"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libxdo-dev libssl-dev

      - name: Install dependencies
        run: bun install
        working-directory: desktop

      - name: Build Tauri app
        run: bun run build:linux
        working-directory: desktop

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: clauderank-linux-appimage
          path: desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload Linux deb
        uses: actions/upload-artifact@v4
        with:
          name: clauderank-linux-deb
          path: desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          if-no-files-found: warn

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: clauderank-macos-dmg
          path: ./artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: clauderank-windows-msi
          path: ./artifacts

      - name: Download Linux AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: clauderank-linux-appimage
          path: ./artifacts

      - name: Download Linux deb artifact
        uses: actions/download-artifact@v4
        with:
          name: clauderank-linux-deb
          path: ./artifacts

      - name: Rename artifacts for release
        run: |
          mv ./artifacts/*.dmg ./artifacts/ClaudeRank-macOS.dmg
          mv ./artifacts/*.msi ./artifacts/ClaudeRank-Windows.msi
          mv ./artifacts/*.AppImage ./artifacts/ClaudeRank-Linux.AppImage
          mv ./artifacts/*.deb ./artifacts/ClaudeRank-Linux.deb

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Automated build from main branch.
            Commit: ${{ github.sha }}
          files: |
            ./artifacts/ClaudeRank-macOS.dmg
            ./artifacts/ClaudeRank-Windows.msi
            ./artifacts/ClaudeRank-Linux.AppImage
            ./artifacts/ClaudeRank-Linux.deb
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
