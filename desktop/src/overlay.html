<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Rank</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    color: #333;
    overflow: hidden;
    user-select: none;
  }
  .panel {
    background: transparent;
    border-radius: 16px;
    height: 100vh;
    position: relative;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transform: translateY(-8px);
    transition: opacity 0.2s ease-out, transform 0.2s ease-out;
  }
  .panel.visible {
    opacity: 1;
    transform: none;
  }
  .drag-strip {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 32px;
    z-index: 10;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding-right: 12px;
    border-radius: 16px 16px 0 0;
  }
  .btn-close {
    background: none; border: none; color: #999; cursor: pointer;
    font-size: 14px; padding: 2px 6px; border-radius: 6px;
  }
  .btn-close:hover { background: rgba(0,0,0,0.06); color: #333; }

  .drag-region { cursor: grab; }
  .drag-region:active { cursor: grabbing; }
  .no-drag { -webkit-app-region: no-drag; app-region: no-drag; }

  .widget-iframe {
    flex: 1;
    border: none;
    border-radius: 16px;
    background: transparent;
    width: 100%;
  }
</style>
</head>
<body>
<div class="panel">
  <div class="drag-strip drag-region">
    <button class="btn-close no-drag" id="btnHide" title="Hide (Alt+Space)">&#x2715;</button>
  </div>
  <iframe id="widgetFrame" class="widget-iframe no-drag"></iframe>
</div>

<script>
const { invoke } = window.__TAURI__.core;
const { listen } = window.__TAURI__.event;
const { getCurrentWindow } = window.__TAURI__.window;

// ── Enable dragging via JS (CSS app-region:drag doesn't work with transparent frameless windows) ──
document.querySelector('.drag-strip').addEventListener('mousedown', (e) => {
  if (e.button !== 0 || e.target.closest('.no-drag')) return;
  getCurrentWindow().startDragging();
});

// ── Load identity and set iframe src ──
(async () => {
  try {
    const widgetBase = await invoke('get_widget_base');
    const id = await invoke('get_ranking_identity');
    const frame = document.getElementById('widgetFrame');
    frame.src = widgetBase + '/widget.html?h=' + encodeURIComponent(id.user_hash) + '&_t=' + Date.now();
  } catch (e) {
    console.error('Failed to load identity:', e);
  }
})();

// ── Animate in/out ──
const panel = document.querySelector('.panel');
listen('overlay-visibility-changed', (event) => {
  if (event.payload.visible) {
    requestAnimationFrame(() => panel.classList.add('visible'));
  } else {
    panel.classList.remove('visible');
    setTimeout(() => invoke('complete_hide'), 200);
  }
});

// ── Hide button ──
document.getElementById('btnHide').addEventListener('click', () => invoke('hide_overlay'));

// ── Bridge: receive messages from widget iframe ──
const DRAG_STRIP_HEIGHT = 32;
window.addEventListener('message', async (e) => {
  if (!e.data) return;
  if (e.data.type === 'copy-image' && e.data.base64) {
    try {
      await invoke('copy_image_to_clipboard', { imageBase64: e.data.base64 });
    } catch (err) {
      console.error('Failed to copy image:', err);
    }
  }
  if (e.data.type === 'force-sync') {
    invoke('force_sync').catch(err => console.error('Failed to force sync:', err));
  }
  if (e.data.type === 'open-url' && e.data.url) {
    invoke('open_url', { url: e.data.url }).catch(err => console.error('Failed to open URL:', err));
  }
  if (e.data.type === 'resize' && e.data.height > 0) {
    const win = getCurrentWindow();
    try {
      const totalH = e.data.height + DRAG_STRIP_HEIGHT;
      const currentSize = await win.innerSize();
      const scaleFactor = await win.scaleFactor();
      const newPhysH = Math.round(totalH * scaleFactor);
      if (Math.abs(currentSize.height - newPhysH) > 2) {
        await win.setSize(new window.__TAURI__.dpi.PhysicalSize(currentSize.width, newPhysH));
      }
    } catch (err) {
      console.error('Failed to resize window:', err);
    }
  }
});
</script>
</body>
</html>
