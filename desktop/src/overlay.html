<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Rank</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    color: #333;
    overflow: hidden;
    user-select: none;
  }
  .panel {
    background: transparent;
    border-radius: 16px;
    height: 100vh;
    position: relative;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transform: translateY(-8px);
    transition: opacity 0.2s ease-out, transform 0.2s ease-out;
  }
  .panel.visible {
    opacity: 1;
    transform: none;
  }
  .drag-strip {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 32px;
    z-index: 10;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding-right: 12px;
    border-radius: 16px 16px 0 0;
  }
  .btn-close {
    background: none; border: none; color: #999; cursor: pointer;
    font-size: 14px; padding: 2px 6px; border-radius: 6px;
  }
  .btn-close:hover { background: rgba(0,0,0,0.06); color: #333; }

  .status-leds {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-left: auto;
    margin-right: 12px;
  }
  .led {
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 6px;
    -webkit-app-region: no-drag;
    app-region: no-drag;
  }
  .led:hover { background: rgba(0,0,0,0.06); }
  .led-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .led-dot.on {
    background: #34c759;
    box-shadow: 0 0 4px rgba(52, 199, 89, 0.6);
  }
  .led-dot.off {
    background: #86868b;
    box-shadow: none;
  }
  .led-dot.error {
    background: #ff3b30;
    box-shadow: 0 0 4px rgba(255, 59, 48, 0.5);
  }
  .led-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: #86868b;
    text-transform: uppercase;
  }

  .drag-region { cursor: grab; }
  .drag-region:active { cursor: grabbing; }
  .no-drag { -webkit-app-region: no-drag; app-region: no-drag; }

  .widget-iframe {
    flex: 1;
    border: none;
    border-radius: 16px;
    background: transparent;
    width: 100%;
  }
</style>
</head>
<body>
<div class="panel">
  <div class="drag-strip drag-region">
    <div class="status-leds">
      <div class="led" id="ledClaude" title="Claude Code sync">
        <div class="led-dot on" id="ledClaudeDot"></div>
        <span class="led-label">Claude</span>
      </div>
      <div class="led" id="ledCursor" title="Cursor sync">
        <div class="led-dot on" id="ledCursorDot"></div>
        <span class="led-label">Cursor</span>
      </div>
    </div>
    <button class="btn-close no-drag" id="btnHide" title="Hide (Alt+Space)">&#x2715;</button>
  </div>
  <iframe id="widgetFrame" class="widget-iframe no-drag"></iframe>
</div>

<script>
const { invoke } = window.__TAURI__.core;
const { listen } = window.__TAURI__.event;
const { getCurrentWindow } = window.__TAURI__.window;

// ── Enable dragging via JS (CSS app-region:drag doesn't work with transparent frameless windows) ──
document.querySelector('.drag-strip').addEventListener('mousedown', (e) => {
  if (e.button !== 0 || e.target.closest('.no-drag')) return;
  invoke('notify_drag_start');
  getCurrentWindow().startDragging();
});

// ── Load identity and set iframe src ──
let widgetUrl = '';
let widgetLoaded = false;
const frame = document.getElementById('widgetFrame');

frame.addEventListener('load', () => { widgetLoaded = true; });
frame.addEventListener('error', () => { widgetLoaded = false; });

async function loadWidget() {
  try {
    const widgetBase = await invoke('get_widget_base');
    const id = await invoke('get_ranking_identity');
    widgetUrl = widgetBase + '/widget.html?h=' + encodeURIComponent(id.user_hash) + '&s=' + encodeURIComponent(id.sync_secret || '');
    frame.src = widgetUrl + '&_t=' + Date.now();
  } catch (e) {
    console.error('Failed to load identity:', e);
  }
}
loadWidget();

// ── Forward sync-complete to widget iframe so it can refresh data ──
listen('sync-complete', () => {
  console.log('[overlay] sync-complete event received, forwarding to iframe, widgetLoaded=', widgetLoaded);
  frame.contentWindow?.postMessage({ type: 'sync-complete' }, '*');
  // Also refresh LED status
  if (typeof updateCursorLed === 'function') updateCursorLed();
});

// ── Animate in/out ──
const panel = document.querySelector('.panel');
listen('overlay-visibility-changed', (event) => {
  if (event.payload.visible) {
    // Retry loading if the widget failed (e.g. server wasn't ready on startup)
    if (!widgetLoaded && widgetUrl) {
      frame.src = widgetUrl + '&_t=' + Date.now();
    }
    requestAnimationFrame(() => panel.classList.add('visible'));

    // Re-check Cursor status when overlay shows (e.g. user just logged in on browser)
    updateCursorLed();
    invoke('get_cursor_config').then(status => {
      if (status.enabled && !status.has_cookie) {
        // Try importing fresh cookies — user may have just logged in
        invoke('force_cursor_sync').catch(() => {});
        setTimeout(updateCursorLed, 3000);
      }
    }).catch(() => {});
  } else {
    panel.classList.remove('visible');
    setTimeout(() => invoke('complete_hide'), 200);
  }
});

// ── Hide button ──
document.getElementById('btnHide').addEventListener('click', () => invoke('hide_overlay'));

// ── LED status indicators ──
const ledClaudeDot = document.getElementById('ledClaudeDot');
const ledCursorDot = document.getElementById('ledCursorDot');

// Claude Code is always "on" if the app is running (it monitors ~/.claude by default).
// We toggle a local flag that the UI shows — actual sync enable/disable could be added later.
let claudeEnabled = true;

async function updateCursorLed() {
  try {
    const status = await invoke('get_cursor_config');
    const dot = ledCursorDot;
    if (status.enabled && status.has_cookie) {
      dot.className = 'led-dot on';
      document.getElementById('ledCursor').title = 'Cursor sync: active' + (status.account_email ? ' (' + status.account_email + ')' : '');
    } else if (status.enabled && !status.has_cookie) {
      dot.className = 'led-dot error';
      document.getElementById('ledCursor').title = 'Cursor sync: no cookie found';
    } else {
      dot.className = 'led-dot off';
      document.getElementById('ledCursor').title = 'Cursor sync: off (click to enable)';
    }
  } catch (e) {
    ledCursorDot.className = 'led-dot off';
  }
}

function updateClaudeLed() {
  ledClaudeDot.className = claudeEnabled ? 'led-dot on' : 'led-dot off';
  document.getElementById('ledClaude').title = claudeEnabled ? 'Claude Code sync: active' : 'Claude Code sync: off';
}

// Toggle Cursor on click — if red (no cookie), open cursor.com to log in
document.getElementById('ledCursor').addEventListener('click', async () => {
  try {
    const status = await invoke('get_cursor_config');
    if (status.enabled && !status.has_cookie) {
      // Red state — open cursor.com so user can log in and get cookies
      await invoke('open_url', { url: 'https://cursor.com/settings' });
    } else if (status.enabled) {
      await invoke('set_cursor_enabled', { enabled: false });
    } else {
      await invoke('enable_cursor_auto');
      // Immediately try syncing after enabling
      await invoke('force_cursor_sync').catch(() => {});
      setTimeout(updateCursorLed, 3000);
    }
    await updateCursorLed();
  } catch (e) {
    console.error('Failed to toggle Cursor:', e);
  }
});

// Toggle Claude on click (controls sync, not the file watcher)
document.getElementById('ledClaude').addEventListener('click', async () => {
  // Claude Code sync is managed by the existing sync_settings — toggle tokens/messages/etc all at once
  try {
    const settings = await invoke('get_sync_settings');
    claudeEnabled = !claudeEnabled;
    // When "off", disable all sync categories; when "on", re-enable defaults
    await invoke('update_sync_settings', {
      settings: {
        tokens: claudeEnabled,
        messages: claudeEnabled,
        sessions: claudeEnabled,
        tool_calls: claudeEnabled,
        prompts: false,
        prompt_hashes: claudeEnabled,
        daily_breakdown: claudeEnabled,
        model_names: claudeEnabled,
        hour_activity: claudeEnabled,
        concurrency_activity: claudeEnabled,
      }
    });
    updateClaudeLed();
  } catch (e) {
    console.error('Failed to toggle Claude:', e);
  }
});

// Initial LED state
(async () => {
  try {
    const settings = await invoke('get_sync_settings');
    claudeEnabled = settings.tokens !== false;
  } catch {}
  updateClaudeLed();
  updateCursorLed();
})();

// Live update Cursor LED on sync status events
listen('cursor-sync-status', (event) => {
  updateCursorLed();
});


// ── Bridge: receive messages from widget iframe ──
const DRAG_STRIP_HEIGHT = 32;
window.addEventListener('message', async (e) => {
  if (!e.data) return;
  if (e.data.type === 'copy-image' && e.data.base64) {
    try {
      await invoke('copy_image_to_clipboard', { imageBase64: e.data.base64 });
    } catch (err) {
      console.error('Failed to copy image:', err);
    }
  }
  if (e.data.type === 'force-sync') {
    invoke('force_sync').catch(err => console.error('Failed to force sync:', err));
  }
  if (e.data.type === 'user-logout') {
    // Disable both syncs on logout
    claudeEnabled = false;
    invoke('update_sync_settings', {
      settings: {
        tokens: false, messages: false, sessions: false, tool_calls: false,
        prompts: false, prompt_hashes: false, daily_breakdown: false,
        model_names: false, hour_activity: false, concurrency_activity: false,
      }
    }).catch(() => {});
    invoke('set_cursor_enabled', { enabled: false }).catch(() => {});
    updateClaudeLed();
    updateCursorLed();
  }
  if (e.data.type === 'user-login') {
    // Enable both syncs on login
    claudeEnabled = true;
    invoke('update_sync_settings', {
      settings: {
        tokens: true, messages: true, sessions: true, tool_calls: true,
        prompts: false, prompt_hashes: true, daily_breakdown: true,
        model_names: true, hour_activity: true, concurrency_activity: true,
      }
    }).catch(() => {});
    invoke('enable_cursor_auto').catch(() => {});
    invoke('force_cursor_sync').catch(() => {});
    updateClaudeLed();
    setTimeout(updateCursorLed, 3000);
  }
  if (e.data.type === 'open-url' && e.data.url) {
    invoke('open_url', { url: e.data.url }).catch(err => console.error('Failed to open URL:', err));
  }
  if (e.data.type === 'resize' && e.data.height > 0) {
    const win = getCurrentWindow();
    try {
      const totalH = e.data.height + DRAG_STRIP_HEIGHT;
      const currentSize = await win.innerSize();
      const scaleFactor = await win.scaleFactor();
      const newPhysH = Math.round(totalH * scaleFactor);
      if (Math.abs(currentSize.height - newPhysH) > 2) {
        await win.setSize(new window.__TAURI__.dpi.PhysicalSize(currentSize.width, newPhysH));
      }
    } catch (err) {
      console.error('Failed to resize window:', err);
    }
  }
});
</script>
</body>
</html>
