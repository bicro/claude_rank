<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Rank</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    color: #333;
    overflow: hidden;
    user-select: none;
  }
  .panel {
    background: rgba(255, 255, 255, 0.95);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 16px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    flex-shrink: 0;
  }
  .header h1 { font-size: 16px; font-weight: 600; color: #333; display: flex; align-items: center; }
  .site-logo { height: 18px; width: 18px; margin-right: 6px; }
  .header-right { display: flex; align-items: center; gap: 6px; }
  .btn-icon {
    background: none; border: none; color: #999; cursor: pointer;
    font-size: 18px; padding: 4px 8px; border-radius: 6px;
  }
  .btn-icon:hover { background: rgba(0,0,0,0.06); color: #333; }

  .drag-region { cursor: grab; }
  .drag-region:active { cursor: grabbing; }
  .no-drag { -webkit-app-region: no-drag; app-region: no-drag; }

  .widget-iframe {
    flex: 1;
    border: none;
    border-radius: 0 0 16px 16px;
    background: transparent;
    width: 100%;
  }
</style>
</head>
<body>
<div class="panel">
  <div class="header drag-region">
    <h1><img src="logo.png" alt="ClaudeRank logo" class="site-logo">ClaudeRank</h1>
    <div class="header-right no-drag">
      <button class="btn-icon" id="btnHide" title="Hide (Alt+Space)">&#x2715;</button>
    </div>
  </div>

  <iframe id="widgetFrame" class="widget-iframe no-drag"></iframe>
</div>

<script>
const { invoke } = window.__TAURI__.core;
const { listen } = window.__TAURI__.event;
const { getCurrentWindow } = window.__TAURI__.window;

// ── Enable dragging via JS (CSS app-region:drag doesn't work with transparent frameless windows) ──
document.querySelector('.drag-region').addEventListener('mousedown', (e) => {
  if (e.button !== 0 || e.target.closest('.no-drag')) return;
  getCurrentWindow().startDragging();
});

// ── Load identity and set iframe src ──
(async () => {
  try {
    const widgetBase = await invoke('get_widget_base');
    const id = await invoke('get_ranking_identity');
    const frame = document.getElementById('widgetFrame');
    frame.src = widgetBase + '/widget.html?h=' + encodeURIComponent(id.user_hash);
  } catch (e) {
    console.error('Failed to load identity:', e);
  }
})();

// ── Hide button ──
document.getElementById('btnHide').addEventListener('click', () => invoke('hide_overlay'));

// ── Bridge: receive image from widget iframe for clipboard copy ──
window.addEventListener('message', async (e) => {
  if (e.data && e.data.type === 'copy-image' && e.data.base64) {
    try {
      await invoke('copy_image_to_clipboard', { imageBase64: e.data.base64 });
    } catch (err) {
      console.error('Failed to copy image:', err);
    }
  }
});
</script>
</body>
</html>
